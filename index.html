<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>디펜스 밥 (Defense BOB)</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐥</text></svg>">
    <style>
        *, *:before, *:after { box-sizing: border-box; }
        :root {
            --bg-color: #2c3e50; --panel-bg: #34495e;
            --money-color: #f1c40f; --primary: #e74c3c;
            --text-light: #ecf0f1; --tab-active: #3498db;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none;
        }
        #game-wrapper {
            position: relative; width: 100%; height: 100%; max-width: 500px; margin: 0 auto;
            display: flex; flex-direction: column; background: #27ae60; overflow: hidden;
        }
        #top-ui {
            background: var(--panel-bg); color: var(--text-light); padding: 10px 15px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 10; flex-shrink: 0;
            position: relative;
        }
        .title-text {
            font-size: 20px; font-weight: 900; color: #f1c40f; 
            text-shadow: 2px 2px 0px #1a252f, -1px -1px 0px #1a252f;
            position: absolute; left: 50%; transform: translateX(-50%);
            white-space: nowrap; letter-spacing: 1px;
        }
        .stat-box { font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 4px; }
        .wave-left { display: flex; align-items: center; gap: 6px; }
        #btn-wave-info {
            border: none; background: #5dade2; color: white; border-radius: 999px;
            width: 20px; height: 20px; font-size: 11px; font-weight: bold; cursor: pointer; line-height: 20px;
            padding: 0;
        }
        #btn-wave-info:active { background: #3498db; }
        .money-text { color: var(--money-color); font-size: 15px; margin-right: 6px; }
        .btn-reset-top {
            background: #e74c3c; color: white; border: none; padding: 4px 6px;
            border-radius: 4px; font-weight: bold; font-size: 11px; cursor: pointer; transition: 0.2s;
        }
        .btn-reset-top:active { background: #c0392b; }
        canvas { flex: 1; width: 100%; height: 0; display: block; }
        #bottom-ui {
            background: #ecf0f1; box-shadow: 0 -4px 6px rgba(0,0,0,0.1);
            z-index: 10; display: flex; flex-direction: column; flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom); position: relative;
            max-height: 56vh; overflow-y: auto; overflow-x: hidden; overscroll-behavior: contain;
        }
        #normal-bottom { display: flex; flex-direction: column; width: 100%; }
        #tab-menu { display: flex; background: #bdc3c7; }
        .tab-btn {
            flex: 1; padding: 10px 0; border: none; background: none;
            font-weight: bold; font-size: 14px; color: #7f8c8d; cursor: pointer; transition: 0.2s;
        }
        .tab-btn.active { background: #ecf0f1; color: var(--tab-active); border-top: 3px solid var(--tab-active); }
        #build-menu { display: flex; gap: 6px; padding: 10px 8px; overflow-x: auto; flex-shrink: 0; position: relative; -webkit-overflow-scrolling: touch; }
        #shop-header {
            display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 10px 12px;
            background: linear-gradient(180deg, #ffffff 0%, #ecf0f1 100%); border-top: 1px solid #d6dbdf;
            border-bottom: 1px solid #d6dbdf;
        }
        #shop-toggle-indicator { color: #2c3e50; font-size: 13px; font-weight: 800; letter-spacing: 0.2px; }
        #card-tooltip { display:none; position:absolute; left:50%; transform:translateX(-50%); bottom: 110px; width: calc(100% - 20px); max-width: 380px; background: rgba(20,25,33,0.92); color: #ecf0f1; border-radius: 14px; padding: 12px; z-index: 15; box-shadow: 0 10px 24px rgba(0,0,0,0.35); }
        #upgrade-menu, #angle-ui { display: none; }
        #card-tooltip strong { display:block; margin-bottom: 6px; font-size: 14px; }
        #card-tooltip p { margin: 0 0 8px; line-height: 1.45; color: #dfe6e9; font-size: 13px; }
        #card-tooltip .tooltip-stats { font-size: 12px; color: #bdc3c7; line-height: 1.5; }
        #build-menu, .card { touch-action: pan-x; }
        #upgrade-menu, #angle-ui { display: none; flex-direction: column; gap: 8px; padding: 10px 12px; max-height: 52vh; overflow-y: auto; position: relative; z-index: 12; -webkit-overflow-scrolling: touch; touch-action: pan-y; }
        #upgrade-menu { background: #f8f9f9; }
        #angle-ui { background: #f8f9f9; }
        #bottom-ui { min-height: 0; }
        .card {
            background: white; border: 2px solid #bdc3c7; border-radius: 8px;
            padding: 6px; width: 68px; height: 60px; text-align: center; font-size: 12px;
            font-weight: bold; color: #2c3e50; flex-shrink: 0; display: flex; flex-direction: column; justify-content: space-evenly;
            position: relative; cursor: grab;
            letter-spacing: -0.5px;
            user-select: none;
        }
        @media (max-width: 450px) {
            #game-wrapper { max-width: 100%; }
            #top-ui { padding: 8px 10px; }
            .title-text { font-size: 18px; }
            .stat-box, .money-text { font-size: 13px; }
            #shop-header { padding: 8px 10px; gap: 8px; }
            #shop-toggle-indicator { font-size: 12px; }
            .tab-btn { font-size: 12px; padding: 8px 0; }
            #build-menu { padding: 8px 6px; gap: 5px; }
            .card { width: 58px; height: 56px; font-size: 11px; }
            .card-cost { font-size: 10px; }
            #card-tooltip { bottom: 90px; width: calc(100% - 16px); padding: 10px; }
            #card-tooltip strong { font-size: 13px; }
            #card-tooltip p { font-size: 12px; }
            #card-tooltip .tooltip-stats { font-size: 11px; }
            #normal-bottom { padding-bottom: 8px; }
            .action-btn { padding: 6px 10px; font-size: 11px; width: 100%; }
            #upgrade-details { font-size: 10px; }
            #bottom-ui { max-height: 62vh; }
        }
        .card:active { cursor: grabbing; }
        .card.disabled { opacity: 0.4; filter: grayscale(1); }
        .card-cost { color: var(--money-color); font-size: 11px; }

        #card-tooltip-media {
            margin-top: 10px; width: 100%; min-height: 120px; border-radius: 12px;
            background: #111; overflow: hidden; position: relative; display: grid; place-items: center;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
        }
        #card-tooltip-media::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.12), transparent 28%),
                        linear-gradient(90deg, rgba(255,255,255,0.05), rgba(255,255,255,0.12), rgba(255,255,255,0.05));
            animation: tooltip-video-shine 2.5s infinite linear;
        }
        #card-tooltip-media .tooltip-video-label {
            position: relative; z-index: 1; color: #f1c40f; font-size: 12px; font-weight: bold;
            letter-spacing: 0.2px; text-transform: uppercase; opacity: 0.85; margin-bottom: 6px;
        }
        #card-tooltip-media .tooltip-video-player {
            position: relative; width: 90%; height: 92px; background: rgba(0,0,0,0.22); border-radius: 10px;
            overflow: hidden; display: grid; place-items: center;
        }
        #card-tooltip-media canvas {
            width: 100%; height: 100%; display: block;
        }
        @keyframes tooltip-video-shine {
            from { transform: translateX(-100%); }
            to { transform: translateX(100%); }
        }
        @keyframes tooltip-video-pulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.08); }
        }
        .action-btn { padding: 6px 12px; border: none; border-radius: 6px; font-weight: bold; font-size: 12px; color: white; width: 95%; cursor: pointer; touch-action: manipulation; }
        .btn-upgrade { background: #2ecc71; }
        .btn-upgrade:active { background: #27ae60; }
        .btn-upgrade.disabled { background: #95a5a6; opacity: 0.7; pointer-events: none; }
        .btn-action { background: #3498db; }
        .btn-action:active { background: #2980b9; }
        .btn-sell { background: #e67e22; }
        .btn-cancel { background: #95a5a6; }
        .btn-cancel:active { background: #7f8c8d; }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 20; text-align: center;
        }
        .overlay h1 { color: #e74c3c; margin-bottom: 10px; }
        .overlay p { font-size: 16px; margin-bottom: 20px; line-height: 1.5; }
        #offline-reward-overlay .reward-card {
            width: min(92%, 420px); background: #182233; border: 1px solid rgba(255,255,255,0.16);
            border-radius: 16px; padding: 16px 14px; text-align: center; box-shadow: 0 14px 32px rgba(0,0,0,0.35);
        }
        #offline-reward-overlay h2 { margin: 0 0 8px; color: #f1c40f; font-size: 19px; }
        #offline-reward-overlay .reward-text { color: #ecf0f1; font-size: 14px; line-height: 1.55; margin: 10px 0 14px; white-space: pre-line; }
        #offline-reward-overlay .reward-note { color: #bdc3c7; font-size: 12px; line-height: 1.45; margin-top: 4px; }
        #wave-info-overlay .wave-info-card {
            width: min(92%, 420px); max-height: 70vh; overflow-y: auto;
            background: #182233; border: 1px solid rgba(255,255,255,0.16); border-radius: 14px;
            padding: 14px; text-align: left;
        }
        #wave-info-overlay h2 { margin: 0 0 8px; color: #f1c40f; font-size: 18px; }
        #wave-info-overlay .wave-info-text { white-space: pre-line; color: #ecf0f1; font-size: 13px; line-height: 1.5; margin: 10px 0 12px; }
        #upgrade-details {
            font-size: 11px; color: #7f8c8d; width: 95%; background: #f8f9f9;
            border: 1px solid #d5dbdb; border-radius: 4px; padding: 6px; margin: 2px 0 6px 0; line-height: 1.4; text-align: left;
        }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 2px; }
        .stat-up { color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="game-over-overlay" class="overlay">
        <h1>STAGE FAILED</h1>
        <p id="fail-wave-text">웨이브 방어 실패!<br><span style="font-size: 13px; color: #bdc3c7;">(건설한 방어탑은 그대로 유지됩니다)</span></p>
        <button class="action-btn btn-upgrade" id="btn-retry-wave" style="width: 260px;" onclick="retryWave(false)">현재 웨이브 재도전 (3초)</button>
        <button class="action-btn btn-cancel" style="width: 260px; margin-top: 10px;" onclick="retryWave(true)">⏪ 이전 웨이브로 돌아가기</button>
    </div>

    <div id="wave-info-overlay" class="overlay">
        <div class="wave-info-card">
            <h2>웨이브 정보</h2>
            <div id="wave-info-text" class="wave-info-text"></div>
            <button class="action-btn btn-cancel" style="width: 100%;" onclick="closeWaveInfo()">닫기</button>
        </div>
    </div>

    <div id="offline-reward-overlay" class="overlay">
        <div class="reward-card">
            <h2>오프라인 보상</h2>
            <div id="offline-reward-text" class="reward-text"></div>
            <div class="reward-note">최대 24시간까지만 계산됩니다.</div>
            <button class="action-btn btn-upgrade" style="width: 100%; margin-top: 14px;" onclick="closeOfflineRewardPopup()">확인</button>
        </div>
    </div>

    <div id="top-ui">
        <div class="wave-left">
            <div class="stat-box">웨이브 <span id="wave-text">1</span></div>
            <button id="btn-wave-info" title="웨이브 정보">i</button>
        </div>
        <div class="title-text">Defense BOB</div>
        <button class="btn-reset-top" onclick="triggerReset()">🔄</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="card-tooltip">
        <strong id="card-tooltip-title"></strong>
        <p id="card-tooltip-desc"></p>
        <div class="tooltip-stats" id="card-tooltip-stats"></div>
        <div id="card-tooltip-media">
            <div class="tooltip-video-label">예시 영상 재생 중</div>
            <div class="tooltip-video-player">
                <canvas id="card-tooltip-video-canvas" width="360" height="92"></canvas>
            </div>
        </div>
    </div>

    <div id="bottom-ui">
        <div id="shop-header">
            <div class="stat-box money-text">💰 <span id="money-text">0</span></div>
            <div id="shop-toggle-indicator">상점</div>
        </div>
        <div id="normal-bottom">
            <div id="tab-menu">
                <button class="tab-btn active" onclick="switchTab(event, 'damage')">⚔️ 피해</button>
                <button class="tab-btn" onclick="switchTab(event, 'utility')">🛡️ 보조</button>
                <button class="tab-btn" onclick="switchTab(event, 'resource')">💎 자원</button>
            </div>

            <div id="build-menu">
                <div class="card" data-category="damage" data-type="cannon">완두콩<br>발사대<div class="card-cost">💰 40</div></div>
                <div class="card" data-category="damage" data-type="shotgun">압력솥<div class="card-cost">💰 80</div></div>
                <div class="card" data-category="damage" data-type="mortar">코코넛<br>발사기<div class="card-cost">💰 130</div></div>
                <div class="card" data-category="damage" data-type="tesla">전기 구이<div class="card-cost">💰 180</div></div>
                <div class="card" data-category="damage" data-type="pyro">토치<div class="card-cost">💰 220</div></div>
                <div class="card" data-category="damage" data-type="crossbow">이쑤시개<br>발사기<div class="card-cost">💰 250</div></div>
                <div class="card" data-category="damage" data-type="fryer">튀김기<div class="card-cost">💰 300</div></div>
                
                <div class="card" data-category="utility" data-type="sprinkler" style="display:none;">정수기<div class="card-cost">💰 50</div></div>
                <div class="card" data-category="utility" data-type="log" style="display:none;">밀대<div class="card-cost">💰 150</div></div>
                <div class="card" data-category="utility" data-type="amplifier" style="display:none;">증폭기<div class="card-cost">💰 100</div></div>
                <div class="card" data-category="utility" data-type="gelatin" style="display:none;">젤라틴<div class="card-cost" id="gelatin-cost-text">💰 320</div></div>

                <div class="card" data-category="resource" data-type="mine" style="display:none;">돼지<br>저금통<div class="card-cost">💰 60</div></div>
            </div>
        </div>

        <div id="upgrade-menu" style="display:none;">
            <div id="upgrade-info" style="font-weight: bold; color: #2c3e50; font-size:13px;">방어탑 정보</div>
            <div id="upgrade-details"></div>
            <button class="action-btn btn-upgrade" id="btn-do-upgrade">업그레이드 (💰 ?)</button>
            <button class="action-btn btn-action" id="btn-set-angle" style="display:none; margin-bottom:4px;">🪵 발사 방향 재설정</button>
            <button class="action-btn btn-sell" id="btn-sell-tower" style="margin-bottom:4px;">🔨 방어탑 판매 (💰 ?)</button>
            <button class="action-btn btn-cancel" id="btn-cancel-upgrade">취소</button>
        </div>

        <div id="angle-ui" style="display:none;">
            <div style="text-align:center; font-size:13px; font-weight:bold; color:#2c3e50; margin-bottom: 4px;">
                👆 화면을 누르거나 드래그하여 방향을 바꾸세요
            </div>
            <button class="action-btn btn-upgrade" style="width: 100%; height:42px; font-size:14px;" onclick="finishAngleSetting()">✅ 방향 설정 완료</button>
        </div>
    </div>
</div>

<script>
    const SAVE_KEY = 'defense_bob_save_v3';
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const state = {
        money: 150, hp: 1, wave: 1, isGameOver: false,
        towers: [], enemies: [], particles: [], projectiles: [],
        enemiesToSpawn: [], spawnTimer: 0, waveDelay: 3.0, isWaveActive: false,
        selectedTower: null, settingAngleMode: false, isDraggingAngle: false,
        isDraggingCard: false, dragCardType: null, dragX: 0, dragY: 0, dragClientY: 0,
        lastTime: performance.now(), autoRetryInterval: null, environmentProps: [],
        pendingGelatin: null, isPaused: false
    };

    const pauseReasons = new Set();
    function setPause(reason, shouldPause) {
        if (shouldPause) pauseReasons.add(reason);
        else pauseReasons.delete(reason);
        state.isPaused = pauseReasons.size > 0;
    }

    const TOWER_DEFS = {
        mine:      { name: '돼지저금통', cost: 60, radius: 15, color: '#ff9ff3', range: 0, cooldownMax: 6.0, prod: 2, upCost: 50 },
        cannon:    { name: '완두콩 발사대', cost: 40, radius: 15, color: '#2ecc71', range: 110, cooldownMax: 1.2, damage: 20, upCost: 40 }, 
        shotgun:   { name: '압력솥', cost: 80, radius: 14, color: '#bdc3c7', range: 55, cooldownMax: 1.0, damage: 35, upCost: 70 },
        mortar:    { name: '코코넛 발사기', cost: 130, radius: 16, color: '#8d6e63', range: 180, cooldownMax: 2.5, damage: 25, upCost: 110 },
        sprinkler: { name: '정수기', cost: 50, radius: 14, color: '#ecf0f1', range: 90, cooldownMax: 1.5, damage: 0, upCost: 45 },
        tesla:     { name: '전기 구이', cost: 180, radius: 14, color: '#95a5a6', range: 120, cooldownMax: 1.6, damage: 17.5, upCost: 150, stunDuration: 0.5 },
        log:       { name: '밀대', cost: 150, radius: 16, color: '#e1b12c', range: 0, cooldownMax: 6.5, damage: 0, upCost: 80, angle: -Math.PI / 2 },
        pyro:      { name: '토치', cost: 220, radius: 15, color: '#3498db', range: 80, cooldownMax: 0.1, damage: 0.54, upCost: 180 },
        crossbow:  { name: '이쑤시개 발사기', cost: 250, radius: 13, color: '#d1ccc0', range: 240, cooldownMax: 0.2, damage: 6, upCost: 200 },
        amplifier: { name: '증폭기', cost: 100, radius: 14, color: '#f39c12', range: 80, cooldownMax: 0, damage: 0, upCost: 90 },
        fryer:     { name: '튀김기', cost: 300, radius: 15, color: '#f39c12', range: 0, cooldownMax: 6.5, damage: 300, upCost: 200 },
        gelatin:   { name: '젤라틴', cost: 320, radius: 14, color: '#9b59b6', range: 0, cooldownMax: 0, damage: 0, upCost: 150 }
    };

    const ENEMY_DEFS = {
        goblin:  { speed: 55, maxHp: 24, radius: 12, emoji: '🐥', reward: 6 },
        wolf:    { speed: 95, maxHp: 15, radius: 10, emoji: '🍜', reward: 5 },
        golem:   { speed: 28, maxHp: 380, radius: 16, emoji: '🍔', reward: 28 },
        scout:   { speed: 125, maxHp: 13, radius: 9, emoji: '🍬', reward: 4 },
        shield:  { speed: 35, maxHp: 190, radius: 14, emoji: '🍞', reward: 15 },
        healer:  { speed: 42, maxHp: 85, radius: 13, emoji: '🥤', reward: 20 },
        grape:   { speed: 24, maxHp: 42, radius: 14, emoji: '🍇', reward: 10 },
        grape_small: { speed: 30, maxHp: 16, radius: 9, emoji: '🍇', reward: 4 },
        milk:    { speed: 32, maxHp: 72, radius: 13, emoji: '🥛', reward: 14, auraRange: 58 },
        fries:   { speed: 30, maxHp: 24, radius: 12, emoji: '🍟', reward: 12, shieldRange: 70, shieldInterval: 5.0 }
    };

    const CARD_INFO = {
        cannon: {
            desc: '기본 단일 공격 타워입니다. 안정적으로 한 대상에게 피해를 줍니다.',
            stats: ['사거리 110', '피해 20', '공격 간격 1.2초']
        },
        shotgun: {
            desc: '근거리 고화력 타워입니다. 짧은 사거리에서 빠르게 큰 피해를 줍니다.',
            stats: ['사거리 55', '피해 35', '공격 간격 1.0초']
        },
        mortar: {
            desc: '느리지만 착탄 지점 주변에 범위 피해를 주는 포격 타워입니다.',
            stats: ['사거리 180', '피해 25', '폭발 범위 46']
        },
        tesla: {
            desc: '단일 감전 공격으로 적을 기절시킵니다. 젖은 적은 추가 연쇄가 발생합니다.',
            stats: ['사거리 120', '피해 17.5', '기절 0.5초']
        },
        pyro: {
            desc: '근거리 지속 화염으로 한 대상을 빠르게 태우는 타워입니다.',
            stats: ['사거리 80', '지속 피해', '짧은 공격 주기']
        },
        crossbow: {
            desc: '긴 사거리에서 빠르게 단일 대상을 저격하는 타워입니다.',
            stats: ['사거리 240', '피해 6', '공격 간격 0.2초']
        },
        fryer: {

    function getUpgradeCost(baseCost, level) {
        return Math.round(baseCost * Math.pow(1.18, level - 1));
    }

    // Level-up growth: +15% of base stat per level, with existing cap ratios respected.
    function getUpgradeValue(base, level, maxRatio = 10) {
        const raw = base * (1 + 0.15 * (level - 1));
        return Math.min(base * maxRatio, raw);
    }

    function getCooldownValue(base, level, minRatio = 0.45) {
        const raw = base * (1 - 0.15 * (level - 1));
        return Math.max(0.3, Math.max(base * minRatio, raw));
    }

    function getRangeValue(base, level, maxRatio = 2.2) {
        const raw = base * (1 + 0.15 * (level - 1));
        return Math.round(Math.min(base * maxRatio, raw));
    }

    function saveGame() {
        if (state.isGameOver) return;
        const saveData = {
            wave: state.wave, money: state.money,
            towers: state.towers.map(t => ({
                x: t.x, y: t.y, type: t.type, level: t.level, totalCost: t.totalCost,
                damage: t.damage, cooldownMax: t.cooldownMax, range: t.range, 
                angle: t.angle, prod: t.prod, stunDuration: t.stunDuration,
                isCompleted: t.isCompleted 
            }))
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
        localStorage.setItem('defense_bob_save_time', Date.now().toString()); 
    }

    function loadGame() {
        const saved = localStorage.getItem(SAVE_KEY);
        if (saved) {
            try {
                const data = JSON.parse(saved);
                state.wave = data.wave; state.money = data.money;
                state.towers = data.towers.map(t => ({
                    ...TOWER_DEFS[t.type], ...t,
                    cooldown: 0, laserCharge: 0, currentTarget: null, isFiring: false, searchDelay: 0,
                    partner: null, collisions: 0, inactiveTimer: 0,
                    baseDamage: TOWER_DEFS[t.type].damage, baseCooldownMax: TOWER_DEFS[t.type].cooldownMax, baseRange: TOWER_DEFS[t.type].range, baseProd: TOWER_DEFS[t.type].prod
                }));

                const gelatins = state.towers.filter(t => t.type === 'gelatin' && t.isCompleted);
                for (let i = 0; i < gelatins.length; i += 2) {
                    if (i + 1 < gelatins.length) {
                        gelatins[i].partner = gelatins[i+1];
                        gelatins[i+1].partner = gelatins[i];
                    }
                }

                const savedTimeStr = localStorage.getItem('defense_bob_save_time');
                if (savedTimeStr) {
                    const savedTime = parseInt(savedTimeStr, 10);
                    if (!isNaN(savedTime)) {
                        const elapsedMs = Date.now() - savedTime;
                        const minutes = elapsedMs / (1000 * 60);
                        if (minutes > 0.1) { 
                            const cappedMinutes = Math.min(minutes, 24 * 60);
                            const offlineReward = Math.round(state.wave * 50 * cappedMinutes / 30);
                            if (offlineReward > 0) {
                                state.money += offlineReward;
                                showOfflineRewardPopup(cappedMinutes, offlineReward);
                            }
                        }
                    }
                }
                return true;
            } catch (e) { console.error('Save loaded failed', e); }
        }
        return false;
    }

    function initEnvironment() {
        state.environmentProps = []; const checkPathX = gameWidth / 2 || 250;
        for (let i = 0; i < 40; i++) {
            let x = Math.random() * gameWidth; let y = Math.random() * gameHeight;
            while (Math.abs(x - checkPathX) < 45) { x = Math.random() * gameWidth; }
            let type = Math.floor(Math.random() * 3);
            let color = '#fff'; if (type === 1) color = Math.random() > 0.5 ? '#f1c40f' : '#e74c3c';
            state.environmentProps.push({ x, y, type, color });
        }
    }

    let lastGameWidth = 0;
    let lastGameHeight = 0;
    let gameWidth = 0;
    let gameHeight = 0;

    function resizeCanvas() {
        const dpr = Math.max(1, window.devicePixelRatio || 1);
        const rect = canvas.getBoundingClientRect();
        const newWidth = Math.floor(rect.width * dpr);
        const newHeight = Math.floor(rect.height * dpr);
        const newGameWidth = rect.width;
        const newGameHeight = rect.height;

        if (lastGameWidth > 0 && lastGameHeight > 0 && (newGameWidth !== lastGameWidth || newGameHeight !== lastGameHeight)) {
            const scaleX = newGameWidth / lastGameWidth;
            const scaleY = newGameHeight / lastGameHeight;
            const scaleAvg = (scaleX + scaleY) / 2;

            state.towers.forEach(t => {
                t.x *= scaleX; t.y *= scaleY;
                if (typeof t.radius === 'number') t.radius *= scaleAvg;
                if (typeof t.range === 'number' && t.range > 0) t.range *= scaleAvg;
                if (typeof t.baseRange === 'number' && t.baseRange > 0) t.baseRange *= scaleAvg;
            });
            state.enemies.forEach(e => {
                e.x *= scaleX; e.y *= scaleY;
                if (typeof e.radius === 'number') e.radius *= scaleAvg;
                if (typeof e.speed === 'number') e.speed *= scaleAvg;
                if (typeof e.kbVelocity === 'number') e.kbVelocity *= scaleAvg;
            });
            state.particles.forEach(p => {
                if (typeof p.x === 'number') p.x *= scaleX;
                if (typeof p.y === 'number') p.y *= scaleY;
                if (typeof p.radius === 'number') p.radius *= scaleAvg;
            });
            state.projectiles.forEach(p => {
                if (typeof p.x === 'number') p.x *= scaleX;
                if (typeof p.y === 'number') p.y *= scaleY;
                if (typeof p.width === 'number') p.width *= scaleAvg;
                if (typeof p.distance === 'number') p.distance *= scaleAvg;
                if (typeof p.maxDistance === 'number') p.maxDistance *= scaleAvg;
                if (typeof p.speed === 'number') p.speed *= scaleAvg;
            });
            state.environmentProps.forEach(p => {
                p.x *= scaleX; p.y *= scaleY;
            });
        }

        gameWidth = newGameWidth;
        gameHeight = newGameHeight;
        canvas.style.width = `${newGameWidth}px`;
        canvas.style.height = `${newGameHeight}px`;
        canvas.width = newWidth;
        canvas.height = newHeight;
        ctx.imageSmoothingEnabled = true;

        lastGameWidth = newGameWidth;
        lastGameHeight = newGameHeight;
        if (state.environmentProps.length === 0) initEnvironment();
    }

        if (goPrevious) state.wave = Math.max(1, state.wave - 1);

    function generateWave(waveNum) {
        let spawnList = [];
        const hpMultiplier = Math.pow(1.25, waveNum - 1); 
        const speedMultiplier = 1 + (waveNum - 1) * 0.02; 
        const densityMultiplier = waveNum >= 20 ? 1 + (waveNum - 19) * 0.75 : 1;
        const addSpawn = (type, count, speedMult = speedMultiplier) => {
            const finalCount = Math.max(0, Math.round(count * densityMultiplier));
            for (let i = 0; i < finalCount; i++) {
                spawnList.push({ type, hpMult: hpMultiplier, speedMult });
            }
        };
        
        let goblinCount = 5 + Math.floor(waveNum * 1.5);
        addSpawn('goblin', goblinCount);

        if (waveNum >= 2) {
            let scoutCount = 4 + Math.floor(waveNum * 1.2);
            addSpawn('scout', scoutCount);
            let wolfCount = 3 + Math.floor(waveNum * 1.0);
            addSpawn('wolf', wolfCount);
        }
        if (waveNum >= 3) {
            let shieldCount = 2 + Math.floor(waveNum * 0.8);
            addSpawn('shield', shieldCount);
            let golemCount = Math.floor(waveNum / 2);
            addSpawn('golem', golemCount);
        }
        if (waveNum >= 4) {
            let healerCount = 1 + Math.floor(waveNum / 3);
            addSpawn('healer', healerCount);
        }
        if (waveNum >= 5) {
            let grapeCount = 2 + Math.floor(waveNum / 3);
            addSpawn('grape', grapeCount, speedMultiplier * 0.95);
        }
        if (waveNum >= 6) {
            let milkCount = 1 + Math.floor(waveNum / 4);
            addSpawn('milk', milkCount, speedMultiplier * 0.9);
        }
        if (waveNum >= 7) {
            let friesCount = 1 + Math.floor(waveNum / 4);
            addSpawn('fries', friesCount, speedMultiplier * 0.92);
        }

        spawnList.sort(() => Math.random() - 0.5); state.enemiesToSpawn = spawnList; state.isWaveActive = true;
    }

    function createParticle(type, x, y, options = {}) {
        state.particles.push({ type, x, y, life: 1.0, ...options });
    }

    function createEnemyEntity(type, hpMult, speedMult, x, y) {
        const def = ENEMY_DEFS[type];
        return {

            hp: def.maxHp * hpMult,
            maxHp: def.maxHp * hpMult,
            speed: def.speed * speedMult,
            isWet: false, wetTimer: 0, wetSlow: 1.0,
            kbVelocity: 0, stunTimer: 0, type,
            oilTimer: 0, oilSlow: 1.0,
            shieldHp: 0, shieldTimer: 0,
            statusImmune: false, slowImmune: false
        };
    }

    function getWaveInfoLines(waveNum) {
        const lines = [];
        const hpMultiplier = Math.pow(1.25, waveNum - 1);
        const speedMultiplier = 1 + (waveNum - 1) * 0.02;

        const goblinCount = 5 + Math.floor(waveNum * 1.5);
        lines.push(`🐥 병아리 x${goblinCount}`);
        if (waveNum >= 2) {
            lines.push(`🍬 스카우트 x${4 + Math.floor(waveNum * 1.2)}`);
            lines.push(`🍜 늑대 x${3 + Math.floor(waveNum * 1.0)}`);
        }
        if (waveNum >= 3) {
            lines.push(`🍞 실드 x${2 + Math.floor(waveNum * 0.8)}`);
            lines.push(`🍔 골렘 x${Math.floor(waveNum / 2)}`);
        }
        if (waveNum >= 4) {
            lines.push(`🥤 힐러 x${1 + Math.floor(waveNum / 3)}`);
        }
        if (waveNum >= 5) {
            lines.push(`🍇 포도 x${2 + Math.floor(waveNum / 3)}`);
        }
        if (waveNum >= 6) {
            lines.push(`🥛 우유 x${1 + Math.floor(waveNum / 4)}`);
        }
        if (waveNum >= 7) {
            lines.push(`🍟 감자튀김 x${1 + Math.floor(waveNum / 4)}`);

        lines.push('');
        lines.push(`체력 배율: x${hpMultiplier.toFixed(2)}`);
        lines.push(`이속 배율: x${speedMultiplier.toFixed(2)}`);
