    function tooltipApplyDamage(target, amount) {
        if (amount <= 0 || !target) return;
        target.hp -= amount;
    }

    function updateTooltipSandbox(sandbox, dt) {
        const e = sandbox.enemies[0];

        for (let i = sandbox.effects.length - 1; i >= 0; i--) {
            sandbox.effects[i].life -= dt;
            if (sandbox.effects[i].life <= 0) sandbox.effects.splice(i, 1);
        }

        if (e.isWet) { e.wetTimer -= dt; if (e.wetTimer <= 0) { e.isWet = false; e.wetSlow = 1.0; } }
        if (e.oilTimer > 0) e.oilTimer -= dt;

        if (e.stunTimer > 0) {
            e.stunTimer -= dt;
            if (e.kbVelocity > 0) { e.y -= e.kbVelocity * dt; e.kbVelocity -= 300 * dt; if (e.kbVelocity < 0) e.kbVelocity = 0; }
        } else {
            if (e.kbVelocity > 0) { e.y -= e.kbVelocity * dt; e.kbVelocity -= 300 * dt; if (e.kbVelocity < 0) e.kbVelocity = 0; }
            else {
                const slowMult = (e.isWet ? e.wetSlow : 1.0) * (e.oilTimer > 0 ? 0.7 : 1.0);
                e.y += e.speed * slowMult * dt;
            }
        }

        if (e.hp <= 0 || e.y >= previewCanvas.height + e.radius) {
            resetTooltipEnemy(sandbox);
            return;
        }

        for (let i = sandbox.projectiles.length - 1; i >= 0; i--) {
            const p = sandbox.projectiles[i];
            if (p.type === 'cannon_ball' || p.type === 'arrow') {
                let dx = e.x - p.x; let dy = e.y - p.y; let dist = Math.hypot(dx, dy);
                if (dist < 8) {
                    tooltipApplyDamage(e, p.damage);
                    sandbox.projectiles.splice(i, 1); continue;
                }
                p.x += (dx / (dist || 1)) * p.speed * dt; p.y += (dy / (dist || 1)) * p.speed * dt;
            } else if (p.type === 'mortar_shell') {
                p.progress += p.speed * dt;
                if (p.progress >= 1) {
                    if (Math.hypot(e.x - p.tx, e.y - p.ty) <= 46) tooltipApplyDamage(e, p.damage);
                    sandbox.projectiles.splice(i, 1);
                } else {
                    p.x = p.startX + (p.tx - p.startX) * p.progress;
                    const arc = Math.sin(p.progress * Math.PI) * 24;
                    p.y = p.startY + (p.ty - p.startY) * p.progress - arc;
                }
            } else if (p.type === 'log_obj') {
                let moveStep = p.speed * dt; p.distance += moveStep;
                if (p.distance > p.maxDistance) { sandbox.projectiles.splice(i, 1); continue; }
                p.x += Math.cos(p.angle) * moveStep; p.y += Math.sin(p.angle) * moveStep;
                if (Math.hypot(e.x - p.x, e.y - p.y) < e.radius + 14) {
                    tooltipApplyDamage(e, p.damage);
                    e.kbVelocity = 70;
                }
            } else if (p.type === 'oil_patch') {
                p.life -= dt;
                if (p.life <= 0) { sandbox.projectiles.splice(i, 1); continue; }
                p.ripple += dt * 18;
                const lateral = Math.abs((e.y - p.y) * Math.cos(p.angle) - (e.x - p.x) * Math.sin(p.angle));
                const forward = (e.x - p.x) * Math.cos(p.angle) + (e.y - p.y) * Math.sin(p.angle);
                if (forward > 0 && forward < p.length && lateral < e.radius + p.hitWidth / 2) {
                    tooltipApplyDamage(e, p.damage * 0.2 * dt);
                    e.oilTimer = 1.4;
                }
            }
        }

        sandbox.towers.forEach(t => {
            let speedMult = 1.0;
            sandbox.towers.forEach(other => {
                if (other !== t && other.type === 'amplifier' && Math.hypot(t.x - other.x, t.y - other.y) <= other.range) {
                    speedMult = Math.max(speedMult, 1 + Math.min(0.5, 0.10 + (other.level - 1) * 0.05));
                }
            });
            t.speedMult = speedMult;
            t.cooldown -= dt * speedMult;

            if (t.type === 'gelatin') {
                if (t.isCompleted && t.partner && t.x < t.partner.x) {
                    if (!e.lastGelatinBounce || Date.now() - e.lastGelatinBounce > 800) {
                        const d = distToSegment(e, t, t.partner);
                        if (d < (e.radius + 6)) {
                            applyStun(e, 0.5, 140);
                            e.lastGelatinBounce = Date.now();
                        }
                    }
                }
                return;
            }

            if (t.type === 'fryer') {
                if (t.cooldown <= 0) {
                    t.cooldown = t.cooldownMax;
                    let angle = e.x >= t.x ? 0 : Math.PI;
                    sandbox.projectiles.push({ type: 'oil_patch', x: t.x, y: t.y, angle, damage: t.damage * 0.7, width: 40, length: 120, hitWidth: 26, hitList: [], life: 1.8, ripple: 0, flow: 0 });
                }
                return;
            }

            if (t.type === 'pyro') {
                const inRange = Math.hypot(t.x - e.x, t.y - e.y) <= t.range;
                t.currentTarget = inRange ? e : null;
                if (!inRange) {
                    t.laserCharge = 0;
                    t.isFiring = false;
                }
                if (t.currentTarget) {
                    t.laserCharge = Math.min(10, t.laserCharge + dt * 3.5); t.isFiring = true;
                    t.beamTx = e.x; t.beamTy = e.y;
                    t.targetAngle = Math.atan2(e.y - t.y, e.x - t.x);
                    if (t.cooldown <= 0) {
                        tooltipApplyDamage(e, t.damage + Math.floor(t.laserCharge));
                        t.cooldown = t.cooldownMax;
                    }
                }
                return;
            }

            let target = null;
            if (t.range > 0 && Math.hypot(t.x - e.x, t.y - e.y) <= t.range) target = e;
            t.currentTarget = target;

            if (target && t.type !== 'sprinkler' && t.type !== 'log' && t.type !== 'tesla') {
                t.targetAngle = Math.atan2(target.y - t.y, target.x - t.x);
            }
            if (t.currentAngle !== undefined) {
                let diff = t.targetAngle - t.currentAngle;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                t.currentAngle += diff * dt * 8;
            }

            if (t.type === 'log') {
                if (t.cooldown <= 0) {
                    t.cooldown = t.cooldownMax;
                    sandbox.projectiles.push({ type: 'log_obj', x: t.x, y: t.y, speed: 120, angle: t.angle, damage: t.damage || 12, hitList: [], distance: 0, maxDistance: 130, rotation: 0 });
                }
                return;
            }

            if (target && t.cooldown <= 0) {
                t.cooldown = t.cooldownMax;
                if (t.type === 'cannon') {
                    sandbox.projectiles.push({ type: 'cannon_ball', x: t.x, y: t.y, speed: 180, target, damage: t.damage });
                } else if (t.type === 'shotgun') {
                    tooltipApplyDamage(e, t.damage);
                    sandbox.effects.push({ type: 'shotgun_burst', x: t.x, y: t.y, tx: target.x, ty: target.y, life: 0.2 });
                } else if (t.type === 'mortar') {
                    let dist = Math.hypot(target.x - t.x, target.y - t.y); let duration = Math.max(0.5, dist / 160);
                    sandbox.projectiles.push({ type: 'mortar_shell', x: t.x, y: t.y, startX: t.x, startY: t.y, tx: target.x, ty: target.y, progress: 0, speed: 1 / duration, damage: t.damage });
                } else if (t.type === 'sprinkler') {
                    if (Math.hypot(t.x - e.x, t.y - e.y) <= t.range) {
                        applyWet(e, 3.0, 0.85);
                        sandbox.effects.push({ type: 'sprinkler_ring', x: t.x, y: t.y, r: t.range, life: 0.35 });
                    }
                } else if (t.type === 'tesla') {
                    let dmg = e.isWet ? t.damage * 1.6 : t.damage;
                    tooltipApplyDamage(e, dmg); applyStun(e, t.stunDuration || 0.5);
                    sandbox.effects.push({ type: 'tesla_arc', x: t.x, y: t.y, tx: target.x, ty: target.y, life: 0.15 });
                } else if (t.type === 'crossbow') {
                    sandbox.projectiles.push({ type: 'arrow', x: t.x, y: t.y, speed: 450, target, damage: t.damage });
                }
            }
        });
    }

    function drawTooltipSandbox(sandbox) {
        const w = previewCanvas.width;
        const h = previewCanvas.height;
        const towers = sandbox.towers;
        const e = sandbox.enemies[0];
        const laneX = sandbox.laneX;

        previewCtx.clearRect(0, 0, w, h);
        previewCtx.fillStyle = '#27ae60';
        previewCtx.fillRect(0, 0, w, h);

        previewCtx.fillStyle = '#8b5a2b';
        previewCtx.fillRect(laneX - 16, 0, 32, h);
        previewCtx.fillStyle = '#7f8c8d';
        for (let y = 0; y < h + 16; y += 14) {
            previewCtx.fillRect(laneX - 18, y - 6, 2, 8);
            previewCtx.fillRect(laneX + 16, y - 6, 2, 8);
        }

        towers.forEach(t => {
            if (t.type === 'gelatin' && t.isCompleted && t.partner && t.x < t.partner.x) {
                previewCtx.strokeStyle = 'rgba(155, 89, 182, 0.7)';
                previewCtx.lineWidth = 4;
                previewCtx.beginPath();
                previewCtx.moveTo(t.x, t.y);
                previewCtx.lineTo(t.partner.x, t.partner.y);
                previewCtx.stroke();
            }

            if (t.type === 'amplifier') {
                const buffed = towers.find(other => other.type === 'cannon');
                if (buffed && Math.hypot(buffed.x - t.x, buffed.y - t.y) <= t.range) {
                    previewCtx.strokeStyle = 'rgba(243, 156, 18, 0.5)';
                    previewCtx.lineWidth = 2;
                    previewCtx.beginPath();
                    previewCtx.arc(t.x, t.y, t.range, 0, Math.PI * 2);
                    previewCtx.stroke();
                    previewCtx.strokeStyle = 'rgba(243, 156, 18, 0.65)';
                    previewCtx.beginPath();
                    previewCtx.moveTo(t.x, t.y);
                    previewCtx.lineTo(buffed.x, buffed.y);
                    previewCtx.stroke();
                }
            }
        });

        towers.forEach(t => {
            if (t.type === 'pyro' && t.isFiring) {
                previewCtx.strokeStyle = 'rgba(230,126,34,0.45)';
                previewCtx.lineWidth = 8;
                previewCtx.beginPath();
                previewCtx.moveTo(t.x, t.y);
                previewCtx.lineTo(e.x, e.y);
                previewCtx.stroke();
                t.isFiring = false;
            }

            previewCtx.beginPath();
            previewCtx.arc(t.x, t.y, t.radius, 0, Math.PI * 2);
            previewCtx.fillStyle = t.color;
            previewCtx.fill();
            previewCtx.strokeStyle = '#2c3e50';
            previewCtx.lineWidth = 1.6;
            previewCtx.stroke();

            previewCtx.save();
            previewCtx.translate(t.x, t.y);
            drawTowerDesign(previewCtx, t.type, t.currentAngle !== undefined ? t.currentAngle : (t.angle || 0), t);
            previewCtx.restore();
        });

        for (const p of sandbox.projectiles) {
            if (p.type === 'cannon_ball') {
                previewCtx.beginPath(); previewCtx.arc(p.x, p.y, 4, 0, Math.PI * 2); previewCtx.fillStyle = '#2ecc71'; previewCtx.fill();
            } else if (p.type === 'arrow') {
                previewCtx.fillStyle = '#f5deb3'; previewCtx.fillRect(p.x - 6, p.y - 1, 12, 2);
            } else if (p.type === 'mortar_shell') {
                previewCtx.beginPath(); previewCtx.arc(p.x, p.y, 6, 0, Math.PI * 2); previewCtx.fillStyle = '#795548'; previewCtx.fill();
                previewCtx.strokeStyle = '#3e2723'; previewCtx.lineWidth = 1; previewCtx.stroke();
            } else if (p.type === 'log_obj') {
                previewCtx.save();
                previewCtx.translate(p.x, p.y);
                previewCtx.rotate(p.angle);
                previewCtx.fillStyle = '#e1b12c'; previewCtx.fillRect(-6, -16, 12, 32);
                previewCtx.fillStyle = '#c23616'; previewCtx.fillRect(-3, -20, 6, 4); previewCtx.fillRect(-3, 16, 6, 4);
                previewCtx.restore();
            } else if (p.type === 'oil_patch') {
                previewCtx.save();
                previewCtx.translate(p.x, p.y);
                previewCtx.rotate(p.angle);
                previewCtx.fillStyle = 'rgba(243, 156, 18, 0.35)';
                previewCtx.fillRect(0, -p.width / 2, p.length, p.width);
                previewCtx.fillStyle = 'rgba(231, 76, 60, 0.24)';
                previewCtx.fillRect(6, -p.width / 2 + 6, Math.max(0, p.length - 12), Math.max(0, p.width - 12));
                previewCtx.restore();
            }
        }

        for (const fx of sandbox.effects) {
            previewCtx.save();
            previewCtx.globalAlpha = Math.max(0, fx.life * 5);
            if (fx.type === 'shotgun_burst') {
                previewCtx.strokeStyle = 'rgba(236, 240, 241, 0.75)';
                previewCtx.lineWidth = 2.5;
                for (let i = -1; i <= 1; i++) {
                    previewCtx.beginPath();
                    previewCtx.moveTo(fx.x, fx.y);
                    previewCtx.lineTo(fx.tx + i * 8, fx.ty + i * 6);
                    previewCtx.stroke();
                }
            } else if (fx.type === 'tesla_arc') {
                previewCtx.strokeStyle = 'rgba(241, 196, 15, 0.95)';
                previewCtx.lineWidth = 2;
                previewCtx.beginPath();
                const mx = (fx.x + fx.tx) / 2 + (Math.random() - 0.5) * 12;
                const my = (fx.y + fx.ty) / 2 + (Math.random() - 0.5) * 12;
                previewCtx.moveTo(fx.x, fx.y);
                previewCtx.lineTo(mx, my);
                previewCtx.lineTo(fx.tx, fx.ty);
                previewCtx.stroke();
            } else if (fx.type === 'sprinkler_ring') {
                previewCtx.strokeStyle = 'rgba(52, 152, 219, 0.7)';
                previewCtx.lineWidth = 2;
                previewCtx.beginPath();
                previewCtx.arc(fx.x, fx.y, fx.r * (1 - fx.life), 0, Math.PI * 2);
                previewCtx.stroke();
            }
            previewCtx.restore();
        }

        previewCtx.font = `${e.radius * 1.8}px Apple Color Emoji, Segoe UI Emoji`;
        previewCtx.textAlign = 'center';
        previewCtx.textBaseline = 'middle';
        previewCtx.fillText('🐥', e.x, e.y);
        if (e.stunTimer > 0) { previewCtx.font = 'bold 10px Arial'; previewCtx.fillText('⚡', e.x - 10, e.y - 10); }
        if (e.isWet) { previewCtx.font = '9px Arial'; previewCtx.fillText('💧', e.x + 10, e.y - 10); }
        if (e.oilTimer > 0) { previewCtx.font = '9px Arial'; previewCtx.fillText('🍳', e.x + 10, e.y + 10); }
        const ratio = Math.max(0, e.hp / e.maxHp);
        previewCtx.fillStyle = '#e74c3c'; previewCtx.fillRect(e.x - 10, e.y - e.radius - 8, 20, 3);
        previewCtx.fillStyle = '#2ecc71'; previewCtx.fillRect(e.x - 10, e.y - e.radius - 8, 20 * ratio, 3);
    }

    function renderTooltipPreview(dt) {
        if (!previewCtx || !tooltipSandbox) return;
        tooltipPreviewTime += dt;
        updateTooltipSandbox(tooltipSandbox, dt);
        drawTooltipSandbox(tooltipSandbox);
    }

    function startTooltipPreview(type) {
        tooltipPreviewType = type || 'cannon';
        tooltipSandbox = createTooltipSandbox(tooltipPreviewType);
        if (previewLabel) {
            previewLabel.innerText = `${TOWER_DEFS[tooltipPreviewType].name} Lv.1 vs 🐥`;
        }
        if (tooltipPreviewFrame) return;
        tooltipPreviewTime = 0;
        let last = performance.now();
        const step = (time) => {
            const dt = (time - last) / 1000;
            last = time;
            renderTooltipPreview(dt);
            tooltipPreviewFrame = requestAnimationFrame(step);
        };
        tooltipPreviewFrame = requestAnimationFrame(step);
    }

    function stopTooltipPreview() {
        if (tooltipPreviewFrame) cancelAnimationFrame(tooltipPreviewFrame);
        tooltipPreviewFrame = null;
        tooltipSandbox = null;
    }
    document.querySelectorAll('.card').forEach(card => {
        const type = card.dataset.type;
        const startDrag = (e) => {
            let currentCost = TOWER_DEFS[type].cost;
            if (type === 'gelatin' && state.pendingGelatin) {
                currentCost = 0;
            }
            if (state.isGameOver || state.money < currentCost) return;
            hideCardTooltip();
            state.isDraggingCard = true; state.dragCardType = type;
            closeUpgradeMenu(); updateDragPos(e);
        };

        const showTooltip = () => {
            const info = CARD_INFO[type];
            if (!info) return;
            const tooltip = document.getElementById('card-tooltip');
            document.getElementById('card-tooltip-title').innerText = TOWER_DEFS[type].name;
            document.getElementById('card-tooltip-desc').innerText = info.desc;
            document.getElementById('card-tooltip-stats').innerText = info.stats.join(' • ');
            tooltip.style.display = 'block';
            setPause('tooltip', true);
            startTooltipPreview(type);
        };

        const hideTooltip = () => {
            document.getElementById('card-tooltip').style.display = 'none';
            setPause('tooltip', false);
            stopTooltipPreview();
        };

        card.addEventListener('pointerdown', (e) => {
            if (e.pointerType === 'touch') {
                cardPointerDown = {
                    target: card, type, x: e.clientX, y: e.clientY,
                    time: performance.now(), hasMoved: false, isScrolling: false,
                    timer: setTimeout(() => {
                        if (cardPointerDown && !cardPointerDown.hasMoved) {
                            showTooltip();
                            ignoreNextCardClick = true;
                        }
                    }, 450)
                };
            } else {
                startDrag(e);
            }
        });

        card.addEventListener('pointermove', (e) => {
            if (cardPointerDown && cardPointerDown.target === card) {
                const dx = e.clientX - cardPointerDown.x;
                const dy = e.clientY - cardPointerDown.y;
                if (!cardPointerDown.hasMoved && Math.hypot(dx, dy) > 10) {
                    cardPointerDown.hasMoved = true;
                    clearTimeout(cardPointerDown.timer);
                    hideCardTooltip();
                    if (Math.abs(dx) > Math.abs(dy)) {
                        cardPointerDown.isScrolling = true;
                    } else {
                        startDrag(e);
                    }
                }
                if (state.isDraggingCard) {
                    updateDragPos(e);
                }
            }
        });

        const clearCardPointerDown = () => {
            if (cardPointerDown && cardPointerDown.timer) {
                clearTimeout(cardPointerDown.timer);
            }
            cardPointerDown = null;
        };

        card.addEventListener('pointerup', (e) => {
            if (cardPointerDown && cardPointerDown.target === card) {
                if (cardPointerDown.timer) {
                    clearTimeout(cardPointerDown.timer);
                }
                cardPointerDown = null;
                hideCardTooltip();
            }
        });

        card.addEventListener('pointercancel', () => {
            if (cardPointerDown && cardPointerDown.timer) {
                clearTimeout(cardPointerDown.timer);
            }
            cardPointerDown = null;
            hideCardTooltip();
        });
        card.addEventListener('pointerleave', () => {
            if (cardPointerDown && cardPointerDown.timer) {
                clearTimeout(cardPointerDown.timer);
            }
            cardPointerDown = null;
            hideCardTooltip();
        });
        card.addEventListener('click', (e) => {
            if (ignoreNextCardClick) {
                ignoreNextCardClick = false;
                e.stopPropagation();
                return;
            }
            hideTooltip();
        });
    });

    const resetCardPointer = () => {
        hideCardTooltip();
        if (cardPointerDown && cardPointerDown.timer) {
            clearTimeout(cardPointerDown.timer);
        }
        cardPointerDown = null;
    };

    window.addEventListener('pointerup', resetCardPointer);
    window.addEventListener('pointercancel', resetCardPointer);
    window.addEventListener('touchend', resetCardPointer);
    window.addEventListener('touchcancel', resetCardPointer);

    buildMenu.addEventListener('pointerdown', (e) => {
        if (e.pointerType === 'touch') {
            buildMenu.dataset.touchStartX = e.clientX;
            buildMenu.dataset.touchStartY = e.clientY;
            buildMenu.dataset.touchScrolling = 'true';
        }
    });

    buildMenu.addEventListener('pointermove', (e) => {
        if (buildMenu.dataset.touchScrolling === 'true') {
            const dx = Math.abs(e.clientX - buildMenu.dataset.touchStartX);
            const dy = Math.abs(e.clientY - buildMenu.dataset.touchStartY);
            if (dx > 10 && dx > dy) {
                e.preventDefault();
                e.stopPropagation();
            }
        }
    });

    buildMenu.addEventListener('pointerup', () => { buildMenu.dataset.touchScrolling = 'false'; });
    buildMenu.addEventListener('pointercancel', () => { buildMenu.dataset.touchScrolling = 'false'; });

    document.getElementById('btn-wave-info').addEventListener('click', openWaveInfo);

    function hideCardTooltip() {
        document.getElementById('card-tooltip').style.display = 'none';
        setPause('tooltip', false);
        stopTooltipPreview();
        if (cardPointerDown && cardPointerDown.timer) {
            clearTimeout(cardPointerDown.timer);
        }
        cardPointerDown = null;
    }

    function updateDragPos(e) {
        if (!state.isDraggingCard) return;
        const rect = canvas.getBoundingClientRect();
        let clientX = e.clientX || (e.touches && e.touches[0].clientX);
        let clientY = e.clientY || (e.touches && e.touches[0].clientY);
        state.dragClientY = clientY;
        state.dragX = (clientX - rect.left) * (canvas.width / rect.width);
        state.dragY = (clientY - rect.top) * (canvas.height / rect.height);
    }

    window.addEventListener('mousemove', e => updateDragPos(e));
    window.addEventListener('touchmove', e => { if (state.isDraggingCard) updateDragPos(e.touches[0]); }, {passive: false});

    function handleDragEnd() {
        if (state.isDraggingCard) {
            const rect = canvas.getBoundingClientRect(); state.isDraggingCard = false;
            
            if (state.dragClientY > rect.bottom || state.dragX < 0 || state.dragX > canvas.width) {
                createParticle('text', canvas.width / 2, canvas.height - 30, {text: '설치 취소됨', color: '#95a5a6'});
            } else {
                let def = TOWER_DEFS[state.dragCardType];
                if (canBuild(state.dragX, state.dragY, def.radius)) {
                    buildTower(state.dragCardType, state.dragX, state.dragY);
                } else {
                    createParticle('text', state.dragX, state.dragY, { text: '설치 불가!', color: '#e74c3c' });
                }
            }
            state.dragCardType = null;
        }
    }
    window.addEventListener('mouseup', handleDragEnd);
    window.addEventListener('touchend', handleDragEnd);

    function distToSegment(p, v, w) {
        let l2 = Math.hypot(v.x - w.x, v.y - w.y) ** 2;
        if (l2 === 0) return Math.hypot(p.x - v.x, p.y - v.y);
        let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
        t = Math.max(0, Math.min(1, t));
        return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
    }

    function isLineNearAnyTower(x1, y1, x2, y2, exclude1, exclude2) {
        for (let t of state.towers) {
            if (t === exclude1 || t === exclude2) continue;
            if (distToSegment(t, {x: x1, y: y1}, {x: x2, y: y2}) < (t.radius + 10)) {
                return true;
            }
        }
        return false;
    }

    function intersectsAnyGelatinMembrane(tx, ty, radius) {
        for (let t of state.towers) {
            if (t.type === 'gelatin' && t.isCompleted && t.partner) {
                if (t.x < t.partner.x) { 
                    if (distToSegment({x: tx, y: ty}, t, t.partner) < (radius + 8)) {
                        return true;
                    }
                }
            }
        }
        return false;
    }

    function canBuild(tx, ty, radius) {
        const checkPathX = canvas.width / 2;
        if (Math.abs(tx - checkPathX) < 40) return false;
        
        if (intersectsAnyGelatinMembrane(tx, ty, radius)) {
            return false;
        }

        let isGelatinSecond = (state.dragCardType === 'gelatin' && state.pendingGelatin);
        if (isGelatinSecond) {
            let d = Math.hypot(state.pendingGelatin.x - tx, state.pendingGelatin.y - ty);
            if (d > 160) return false; 
            if (d < 40) return false;  
            if (isLineNearAnyTower(state.pendingGelatin.x, state.pendingGelatin.y, tx, ty, state.pendingGelatin, null)) {
                return false;
            }
        }

        return state.towers.every(t => Math.hypot(t.x - tx, t.y - ty) > (t.radius + radius + 5));
    }

    function buildTower(type, x, y) {
        let def = TOWER_DEFS[type];
        let cost = def.cost;
        if (type === 'gelatin' && state.pendingGelatin) {
            cost = 0;
        }
        state.money -= cost;
        let newTower = {
            x: x, y: y, type: type, level: 1, cooldown: 0, laserCharge: 0, searchDelay: 0,
            currentTarget: null, totalCost: cost, isFiring: false, beamTx: 0, beamTy: 0,
            angle: def.angle || -Math.PI / 2, targetAngle: def.angle || -Math.PI / 2, currentAngle: def.angle || -Math.PI / 2, 
            isBuffed: false, speedMult: 1.0,
            baseDamage: def.damage, baseCooldownMax: def.cooldownMax, baseRange: def.range, baseProd: def.prod,
            ...def
        };

        if (type === 'gelatin') {
            if (!state.pendingGelatin) {
                newTower.isCompleted = false;
                newTower.partner = null;
                newTower.collisions = 0;
                newTower.inactiveTimer = 0;
                state.pendingGelatin = newTower;
            } else {
                newTower.isCompleted = true;
                newTower.partner = state.pendingGelatin;
                newTower.collisions = 0;
                newTower.inactiveTimer = 0;

                state.pendingGelatin.isCompleted = true;
                state.pendingGelatin.partner = newTower;
                state.pendingGelatin = null;
            }
        }

        state.towers.push(newTower);
        createParticle('text', x, y, { text: '-💰' + cost, color: '#e74c3c' });
        saveGame();
    }

    const handleDown = (clientX, clientY) => {
        if (state.isGameOver || state.isDraggingCard) return;
        const rect = canvas.getBoundingClientRect();
        const tx = (clientX - rect.left) * (canvas.width / rect.width);
        const ty = (clientY - rect.top) * (canvas.height / rect.height);

        if (state.settingAngleMode && state.selectedTower && state.selectedTower.type === 'log') {
            state.isDraggingAngle = true; 
            state.selectedTower.angle = Math.atan2(ty - state.selectedTower.y, tx - state.selectedTower.x);
            return;
        }

        let clickedTower = null;
        for (let tower of state.towers) {
            if (Math.hypot(tower.x - tx, tower.y - ty) <= tower.radius + 15) { clickedTower = tower; break; }
        }
        if (clickedTower) openUpgradeMenu(clickedTower); else closeUpgradeMenu();
    };

    const handleMove = (clientX, clientY) => {
        if (state.settingAngleMode && state.isDraggingAngle && state.selectedTower) {
            const rect = canvas.getBoundingClientRect();
            const tx = (clientX - rect.left) * (canvas.width / rect.width);
            const ty = (clientY - rect.top) * (canvas.height / rect.height);
            state.selectedTower.angle = Math.atan2(ty - state.selectedTower.y, tx - state.selectedTower.x);
        }
    };

    const handleUp = () => { if (state.settingAngleMode) state.isDraggingAngle = false; };

    canvas.addEventListener('mousedown', e => handleDown(e.clientX, e.clientY));
    canvas.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
    window.addEventListener('mouseup', handleUp);
    canvas.addEventListener('touchstart', e => { if(e.touches[0].clientY < canvas.getBoundingClientRect().bottom) { e.preventDefault(); handleDown(e.touches[0].clientX, e.touches[0].clientY); } }, { passive: false });
    canvas.addEventListener('touchmove', e => { if(e.touches[0].clientY < canvas.getBoundingClientRect().bottom) { e.preventDefault(); handleMove(e.touches[0].clientX, e.touches[0].clientY); } }, { passive: false });
    window.addEventListener('touchend', e => handleUp());

    function openUpgradeMenu(tower) {
        state.selectedTower = tower;
        document.getElementById('tab-menu').style.display = 'none';
        document.getElementById('build-menu').style.display = 'none';
        document.getElementById('upgrade-menu').style.display = 'flex';
        document.getElementById('btn-set-angle').style.display = tower.type === 'log' ? 'block' : 'none';
        updateUpgradeUI();
    }

    function closeUpgradeMenu() {
        state.selectedTower = null; state.settingAngleMode = false; state.isDraggingAngle = false;
        document.getElementById('normal-bottom').style.display = 'flex';
        document.getElementById('angle-ui').style.display = 'none';
        document.getElementById('tab-menu').style.display = 'flex';
        document.getElementById('build-menu').style.display = 'flex';
        document.getElementById('upgrade-menu').style.display = 'none';
        setTimeout(resizeCanvas, 10);
    }

    function updateUpgradeUI() {
        if (!state.selectedTower) return;
        let t = state.selectedTower;
        let cost = getUpgradeCost(t.upCost, t.level);
        let refund = Math.floor(t.totalCost * 0.6);
        
        document.getElementById('upgrade-info').innerHTML = `Lv.${t.level} ➡️ <span style="color:#2ecc71;">Lv.${t.level + 1}</span> ${t.name}`;
        let btn = document.getElementById('btn-do-upgrade'); btn.innerText = `업그레이드 (💰 ${cost})`;
        document.getElementById('btn-sell-tower').innerText = `🔨 판매 (💰 +${refund})`;
        if (state.money < cost) btn.classList.add('disabled'); else btn.classList.remove('disabled');

        let detailsHtml = '';
        if (t.type === 'mine') {
            const nextProd = Math.min(8, Math.round(getUpgradeValue(t.baseProd, t.level + 1)));
            const nextCd = getCooldownValue(t.baseCooldownMax, t.level + 1);
            detailsHtml += `<div class="stat-row"><span>골드 생산량:</span> <span>💰 ${t.prod} ➡️ <span class="stat-up">💰 ${nextProd}</span></span></div>`;
            detailsHtml += `<div class="stat-row"><span>생산 대기시간:</span> <span>${t.cooldownMax.toFixed(2)}초 ➡️ <span class="stat-up">${nextCd.toFixed(2)}초</span></span></div>`;
        } else if (t.type === 'amplifier') {
            let curBuff = Math.min(50, 10 + (t.level - 1) * 5); let nextBuff = Math.min(50, curBuff + 5); let cap = nextBuff >= 50 ? ' (MAX)' : '';
            detailsHtml += `<div class="stat-row"><span>공격 속도 증가:</span> <span>📈 +${curBuff}% ➡️ <span class="stat-up">📈 +${nextBuff}%${cap}</span></span></div>`;
            detailsHtml += `<div class="stat-row"><span>강화 사거리:</span> <span>📏 ${t.range} ➡️ <span class="stat-up">📏 ${t.range + 15}</span></span></div>`;
        } else if (t.type === 'gelatin') {
            let curRegen = Math.max(3.0, 8.0 - (t.level - 1) * 0.5).toFixed(1);
            let nextRegen = Math.max(3.0, 8.0 - t.level * 0.5).toFixed(1);
            detailsHtml += `<div class="stat-row"><span>재생성 대기시간:</span> <span>⏱️ ${curRegen}초 ➡️ <span class="stat-up">${nextRegen}초</span></span></div>`;
            detailsHtml += `<div class="stat-row"><span>최대 충돌 횟수:</span> <span>7회 (고정)</span></div>`;
        } else {
            if (t.type !== 'sprinkler' && t.type !== 'log') {
                let currentDamage = t.baseDamage ? getUpgradeValue(t.baseDamage, t.level) : t.damage;
                let nextDamage = t.baseDamage ? getUpgradeValue(t.baseDamage, t.level + 1) : t.damage + Math.max(1, Math.floor(t.damage * 0.35));
                detailsHtml += `<div class="stat-row"><span>기본 피해량:</span> <span>⚔️ ${Number.isInteger(currentDamage) ? currentDamage : currentDamage.toFixed(2)} ➡️ <span class="stat-up">⚔️ ${Number.isInteger(nextDamage) ? nextDamage : nextDamage.toFixed(2)}</span></span></div>`;
            } else if (t.type === 'log') {
                let curDist = 200 + (t.level * 80); let nextDist = 200 + ((t.level + 1) * 80);
                detailsHtml += `<div class="stat-row"><span>굴러가는 거리:</span> <span>📏 ${curDist} ➡️ <span class="stat-up">📏 ${nextDist}</span></span></div>`;
            }
            if (t.range > 0) {
                let currentRange = t.baseRange ? getRangeValue(t.baseRange, t.level) : t.range;
                let nextRange = t.baseRange ? getRangeValue(t.baseRange, t.level + 1) : t.range + 15;
                detailsHtml += `<div class="stat-row"><span>탐지 사거리:</span> <span>📏 ${currentRange} ➡️ <span class="stat-up">📏 ${nextRange}</span></span></div>`;
            }

            let speedMult = 1.0;
            state.towers.forEach(other => {
                if (other.type === 'amplifier' && Math.hypot(t.x - other.x, t.y - other.y) <= other.range) {
                    speedMult = Math.max(speedMult, 1 + Math.min(0.5, 0.10 + (other.level - 1) * 0.05));
                }
            });
            let curSpeed = (t.cooldownMax / speedMult).toFixed(2); let nextSpeed = (Math.max(0.1, t.cooldownMax * 0.9) / speedMult).toFixed(2);
            let buffTag = speedMult > 1.0 ? ' <span style="color:#f39c12; font-size:10px;">(강화됨)</span>' : '';
            detailsHtml += `<div class="stat-row"><span>공격 대기시간:</span> <span>⏱️ ${curSpeed}초${buffTag} ➡️ <span class="stat-up">${nextSpeed}초</span></span></div>`;
        }
        document.getElementById('upgrade-details').innerHTML = detailsHtml;
    }

    const handleUpgradeTouch = () => {
        let t = state.selectedTower; if (!t) return;
        let cost = getUpgradeCost(t.upCost, t.level);
        if (state.money >= cost) {
            state.money -= cost; t.totalCost += cost; t.level++;
            if (t.type === 'mine') {
                t.prod = Math.min(8, Math.round(getUpgradeValue(t.baseProd, t.level)));
                t.cooldownMax = getCooldownValue(t.baseCooldownMax, t.level);
            } else if (t.type === 'amplifier') {
                t.range = getRangeValue(t.baseRange, t.level);
            } else if (t.type === 'gelatin') {
                // gelatin remains the same mechanics, level only affects regen time
            } else {
                if (t.type === 'log') {
                    t.damage = getUpgradeValue(t.baseDamage || 0, t.level);
                } else {
                    t.damage = getUpgradeValue(t.baseDamage, t.level);
                }
                if (t.range > 0) t.range = getRangeValue(t.baseRange, t.level);
                t.cooldownMax = getCooldownValue(t.baseCooldownMax, t.level);
                if (t.type === 'tesla') t.stunDuration = Math.min(1.8, (t.stunDuration || 0.5) + 0.25);
            }
            
            if (t.type === 'gelatin' && t.partner) {
                t.partner.level = t.level;
                t.partner.totalCost = t.totalCost;
            }

            createParticle('text', t.x, t.y, { text: '레벨 업!', color: '#2ecc71' }); updateUpgradeUI(); saveGame();
        }
    };
    document.getElementById('btn-do-upgrade').addEventListener('click', handleUpgradeTouch);

    const handleSellTouch = () => {
        if (!state.selectedTower) return;
        let t = state.selectedTower; let refund = Math.floor(t.totalCost * 0.6); state.money += refund;
        createParticle('text', t.x, t.y, { text: '+💰' + refund, color: '#f1c40f' });
        
        if (t.type === 'gelatin') {
            if (t.partner) {
                let partnerIndex = state.towers.indexOf(t.partner);
                if (partnerIndex > -1) {
                    state.towers.splice(partnerIndex, 1);
                }
            }
            if (state.pendingGelatin === t) {
                state.pendingGelatin = null;
            }
        }

        let index = state.towers.indexOf(t); if(index > -1) state.towers.splice(index, 1);
        closeUpgradeMenu(); saveGame();
    };
    document.getElementById('btn-sell-tower').addEventListener('click', handleSellTouch);

    const handleSetAngleTouch = () => {
        if (state.selectedTower && state.selectedTower.type === 'log') {
            state.settingAngleMode = true;
            document.getElementById('normal-bottom').style.display = 'none';
            document.getElementById('angle-ui').style.display = 'flex';
        }
    };
    document.getElementById('btn-set-angle').addEventListener('click', handleSetAngleTouch);

    window.finishAngleSetting = function() {
        state.settingAngleMode = false; state.isDraggingAngle = false;
        document.getElementById('normal-bottom').style.display = 'flex';
        document.getElementById('angle-ui').style.display = 'none';
        if(state.selectedTower) createParticle('text', state.selectedTower.x, state.selectedTower.y, { text: '방향 저장됨!', color: '#27ae60' });
        saveGame(); setTimeout(resizeCanvas, 5);
    };

    const handleCancelTouch = () => { closeUpgradeMenu(); };
    document.getElementById('btn-cancel-upgrade').addEventListener('click', handleCancelTouch);

    function applyStun(target, duration, knockback = 0) {
        if (target.statusImmune) return false;
        target.stunTimer = Math.max(target.stunTimer || 0, duration);
        if (knockback > 0) target.kbVelocity = Math.max(target.kbVelocity || 0, knockback);
        return true;
    }

    function applyWet(target, duration, slowMult) {
        if (target.slowImmune) return false;
        target.isWet = true;
        target.wetTimer = Math.max(target.wetTimer || 0, duration);
        target.wetSlow = Math.min(target.wetSlow || 1.0, slowMult);
        return true;
    }

    function applyShield(target, shieldHp, duration) {
        target.shieldHp = Math.max(target.shieldHp || 0, shieldHp);
        target.shieldTimer = Math.max(target.shieldTimer || 0, duration);
    }

    function applyDamageToEnemy(target, baseDamage) {
        let reduction = 0;
        state.enemies.forEach(e => {
            if (e.type === 'shield' && e.hp > 0 && Math.hypot(e.x - target.x, e.y - target.y) <= 70) reduction = 0.25; 
        });
        if (target.shieldHp > 0 && baseDamage > 0) {
            const absorbed = Math.min(target.shieldHp, baseDamage);
            target.shieldHp -= absorbed;
            baseDamage -= absorbed;
        }
        if (baseDamage <= 0) return;
        if (reduction > 0 && baseDamage > 0) createParticle('splash', target.x, target.y, { radius: 15, color: 'rgba(52, 152, 219, 0.4)' }); 
        target.hp -= baseDamage * (1 - reduction);
    }

    function update(dt) {
        const checkPathX = canvas.width / 2;

        for (let i = state.particles.length - 1; i >= 0; i--) {
            state.particles[i].life -= dt * 2;
            if (state.particles[i].life <= 0) state.particles.splice(i, 1);
        }

        if (state.isGameOver) return; 
        document.getElementById('wave-text').innerText = state.wave;
        document.getElementById('money-text').innerText = state.money;
        
        if (state.selectedTower && !state.settingAngleMode) updateUpgradeUI();

        document.querySelectorAll('.card').forEach(card => {
            let tType = card.dataset.type;
            let cost = TOWER_DEFS[tType].cost;
            if (tType === 'gelatin') {
                let gelCard = document.getElementById('gelatin-cost-text');
                if (gelCard) {
                    if (state.pendingGelatin) {
                        cost = 0;
                        gelCard.innerText = '💰 0 (연결)';
                    } else {
                        gelCard.innerText = `💰 ${TOWER_DEFS.gelatin.cost}`;
                    }
                }
            }
            if (state.money < cost) card.classList.add('disabled');
            else card.classList.remove('disabled');
        });

        if (state.isWaveActive) {
            state.spawnTimer += dt;
            if (state.spawnTimer > 1.2 && state.enemiesToSpawn.length > 0) {
                state.spawnTimer = 0;
                let next = state.enemiesToSpawn.shift();
                state.enemies.push(createEnemyEntity(next.type, next.hpMult, next.speedMult, checkPathX + (Math.random() * 26 - 13), -20));
            }
            if (state.enemiesToSpawn.length === 0 && state.enemies.length === 0) {
                state.isWaveActive = false; state.waveDelay = 3.0;
                let bonus = state.wave * 20; state.money += bonus;
                createParticle('text', canvas.width/2, canvas.height/2, { text: `웨이브 ${state.wave} 완료! +💰${bonus}`, color: '#f1c40f' });
                saveGame();
            }
        } else {
            state.waveDelay -= dt;
            if (state.waveDelay <= 0) { state.wave++; generateWave(state.wave); }
        }

        state.enemies.forEach(enemy => {
            enemy.statusImmune = false;
            enemy.slowImmune = false;
        });

        for (let i = state.enemies.length - 1; i >= 0; i--) {
            let e = state.enemies[i];
            if (e.shieldTimer > 0) {
                e.shieldTimer -= dt;
                if (e.shieldTimer <= 0) e.shieldHp = 0;
            }

            if (e.type === 'milk') {
                const auraRange = e.auraRange || 58;
                state.enemies.forEach(other => {
                    if (other !== e && Math.hypot(other.x - e.x, other.y - e.y) <= auraRange) {
                        other.statusImmune = true;
                        other.slowImmune = true;
                        other.stunTimer = 0;
                        other.wetTimer = 0;
                        other.isWet = false;
                        other.wetSlow = 1.0;
                        other.oilTimer = 0;
                        other.oilSlow = 1.0;
                    }
                });
            }

            if (e.type === 'fries') {
                if (!e.shieldCooldown) e.shieldCooldown = e.shieldInterval || 5.0;
                e.shieldCooldown -= dt;
                if (e.shieldCooldown <= 0) {
                    e.shieldCooldown = e.shieldInterval || 5.0;
                    state.enemies.forEach(other => {
                        if (other !== e && Math.hypot(other.x - e.x, other.y - e.y) <= (e.shieldRange || 70)) {
                            applyShield(other, e.maxHp, 5.0);
                            createParticle('text', other.x, other.y - 12, { text: '🛡️', color: '#3498db' });
                        }
                    });
                    createParticle('splash', e.x, e.y, { radius: e.shieldRange || 70, color: 'rgba(52, 152, 219, 0.18)' });
                }
            }

            if (e.type === 'healer') {
                if (!e.healCooldown) e.healCooldown = 1.5;  e.healCooldown -= dt;
                if (e.healCooldown <= 0) {
                    e.healCooldown = 1.5; let healedAny = false;
                    state.enemies.forEach(other => {
                        if (other !== e && Math.hypot(other.x - e.x, other.y - e.y) <= 90) {
                            let healAmount = Math.min(other.maxHp - other.hp, other.maxHp * 0.25); 
                            if (healAmount > 0) {
                                other.hp += healAmount; healedAny = true;
                                createParticle('text', other.x, other.y - 10, { text: '💚 +' + Math.floor(healAmount), color: '#2ecc71' });
                            }
                        }
                    });
                    if (healedAny) createParticle('splash', e.x, e.y, { radius: 90 });
                }
            }

            if (e.isWet) { e.wetTimer -= dt; if (e.wetTimer <= 0) { e.isWet = false; e.wetSlow = 1.0; } }
            if (e.oilTimer > 0) { e.oilTimer -= dt; }

            if (e.stunTimer > 0 && !e.statusImmune) {
                e.stunTimer -= dt;
                if (e.kbVelocity > 0) { e.y -= e.kbVelocity * dt; e.kbVelocity -= 300 * dt; if (e.kbVelocity < 0) e.kbVelocity = 0; }
            } else {
                if (e.kbVelocity > 0) { e.y -= e.kbVelocity * dt; e.kbVelocity -= 300 * dt; if (e.kbVelocity < 0) e.kbVelocity = 0; }
                else {
                    let slowMult = e.slowImmune ? 1.0 : (e.isWet ? e.wetSlow : 1.0) * (e.oilTimer > 0 ? 0.7 : 1.0);
                    e.y += e.speed * slowMult * dt;
                }
            }

            if (e.hp <= 0) {
                if (e.type === 'grape') {
                    for (let n = 0; n < 2; n++) {
                        state.enemies.push(createEnemyEntity('grape_small', 0.85, 1.05, e.x + (n === 0 ? -10 : 10), e.y + (n === 0 ? -4 : 4)));
                    }
                    createParticle('text', e.x, e.y, { text: '🍇 분열!', color: '#9b59b6' });
                }
                state.money += e.reward;
                createParticle('text', e.x, e.y, { text: '+💰' + e.reward, color: '#f1c40f' });
                state.enemies.splice(i, 1); continue;
            }

            if (e.y >= canvas.height + e.radius) {
                state.hp = 0; state.isGameOver = true;
                createParticle('explosion', e.x, canvas.height, { radius: 60 });
                setTimeout(() => { 
                    const overlay = document.getElementById('game-over-overlay');
                    const btnRetry = document.getElementById('btn-retry-wave');
                    overlay.style.display = 'flex';
                    let autoSec = 3; btnRetry.innerText = `현재 웨이브 재도전 (${autoSec}초)`;
                    state.autoRetryInterval = setInterval(() => {
                        autoSec--;
                        if (autoSec > 0) btnRetry.innerText = `현재 웨이브 재도전 (${autoSec}초)`;
                        else { clearInterval(state.autoRetryInterval); state.autoRetryInterval = null; retryWave(false); }
                    }, 1000);
                }, 800);
                return;
            }
        }

        for (let i = state.projectiles.length - 1; i >= 0; i--) {
            let p = state.projectiles[i];
            if (p.type === 'cannon_ball' || p.type === 'arrow') {
                if (p.target && state.enemies.includes(p.target)) {
                    let dx = p.target.x - p.x; let dy = p.target.y - p.y; let dist = Math.hypot(dx, dy);
                    if (dist < 8) {
                        applyDamageToEnemy(p.target, p.damage);
                        createParticle(p.type === 'arrow' ? 'splash' : 'explosion', p.target.x, p.target.y, { radius: 10 });
                        state.projectiles.splice(i, 1); continue;
                    }
                    p.x += (dx / dist) * p.speed * dt; p.y += (dy / dist) * p.speed * dt;
                } else state.projectiles.splice(i, 1);
            } else if (p.type === 'mortar_shell') {
                p.progress += p.speed * dt;
                if (p.progress >= 1) {
                    createParticle('explosion', p.tx, p.ty, { radius: 46 });
                    state.enemies.forEach(e => { if (Math.hypot(e.x - p.tx, e.y - p.ty) <= 46) applyDamageToEnemy(e, p.damage); });
                    state.projectiles.splice(i, 1);
                } else {
                    p.x = p.startX + (p.tx - p.startX) * p.progress;
                    let arc = Math.sin(p.progress * Math.PI) * 60; p.y = p.startY + (p.ty - p.startY) * p.progress - arc;
                }
            } else if (p.type === 'log_obj') {
                let moveStep = p.speed * dt; p.distance += moveStep; p.rotation += dt * 6.0; 
                if (p.distance > p.maxDistance) { state.projectiles.splice(i, 1); continue; }
                p.x += Math.cos(p.angle) * moveStep; p.y += Math.sin(p.angle) * moveStep;
                state.enemies.forEach(e => {
                    if (Math.hypot(e.x - p.x, e.y - p.y) < e.radius + 14) {
                        if (!p.hitList.includes(e)) {
                            p.hitList.push(e); applyDamageToEnemy(e, p.damage);
                            e.kbVelocity = 70; createParticle('text', e.x, e.y, { text: '🪵 밀침!', color: '#e67e22' });
                        }
                    }
                });
            } else if (p.type === 'oil_patch') {
                p.life -= dt;
                if (p.life <= 0) { state.projectiles.splice(i, 1); continue; }
                p.flow += dt * 8;
                p.ripple += dt * 18;
                if (Math.random() < 0.42) {
                    createParticle('splash', p.x + Math.cos(p.angle) * (p.length * 0.4), p.y + Math.sin(p.angle) * (p.length * 0.4), { radius: 10, color: 'rgba(237, 127, 16, 0.35)' });
                }
                state.enemies.forEach(e => {
                    let lateral = Math.abs((e.y - p.y) * Math.cos(p.angle) - (e.x - p.x) * Math.sin(p.angle));
                    let forward = (e.x - p.x) * Math.cos(p.angle) + (e.y - p.y) * Math.sin(p.angle);
                    if (forward > 0 && forward < p.length && lateral < e.radius + p.hitWidth / 2) {
                        if (!p.hitList.includes(e)) {
                            p.hitList.push(e);
                            applyDamageToEnemy(e, p.damage * 0.32 * dt);
                            e.oilTimer = 3.0;
                            e.oilSlow = 0.7;
                            createParticle('text', e.x, e.y, { text: '🔥 기름!', color: '#d35400' });
                        }
                        if (e.oilTimer > 0) {
                            applyDamageToEnemy(e, p.damage * 0.2 * dt);
                        }
                    }
                });
            }
        }

        state.towers.forEach(t => {
            let speedMult = 1.0;
            state.towers.forEach(other => {
                if (other.type === 'amplifier' && Math.hypot(t.x - other.x, t.y - other.y) <= other.range) {
                    speedMult = Math.max(speedMult, 1 + Math.min(0.5, 0.10 + (other.level - 1) * 0.05));
                }
            });
            
            t.speedMult = speedMult; t.isBuffed = (speedMult > 1.0 && t.type !== 'amplifier' && t.type !== 'mine');
            t.cooldown -= dt * speedMult; 

            if (t.type === 'mine') {
                if (t.cooldown <= 0) {
                    state.money += t.prod; t.cooldown = t.cooldownMax;
                    createParticle('text', t.x, t.y - 12, { text: '+💰' + t.prod, color: '#f1c40f' });
                } return;
            } else if (t.type === 'amplifier') return; 

            if (t.type === 'gelatin') {
                if (t.isCompleted && t.partner && t.x < t.partner.x) {
                    if (t.inactiveTimer > 0) {
                        t.inactiveTimer -= dt;
                        t.partner.inactiveTimer = t.inactiveTimer;
                        if (t.inactiveTimer <= 0) {
                            t.collisions = 0;
                            t.partner.collisions = 0;
                            createParticle('text', (t.x + t.partner.x)/2, (t.y + t.partner.y)/2, { text: '젤라틴 재생성!', color: '#2ecc71' });
                        }
                    } else {
                        state.enemies.forEach(e => {
                            if (!e.lastGelatinBounce || Date.now() - e.lastGelatinBounce > 800) {
                                let dist = distToSegment(e, t, t.partner);
                                if (dist < (e.radius + 6)) {
                                    applyStun(e, 0.5, 140);
                                    e.lastGelatinBounce = Date.now();
                                    
                                    t.collisions++;
                                    t.partner.collisions = t.collisions;
                                    
                                    createParticle('splash', e.x, e.y, { radius: 25, color: 'rgba(155, 89, 182, 0.6)' });
                                    createParticle('text', e.x, e.y, { text: '🍮 튕김!', color: '#9b59b6' });
                                    
                                    let maxCollisions = 7;
                                    if (t.collisions >= maxCollisions) {
                                        let regenTime = Math.max(3.0, 8.0 - (t.level - 1) * 0.5);
                                        t.inactiveTimer = regenTime;
                                        t.partner.inactiveTimer = regenTime;
                                        createParticle('text', (t.x + t.partner.x)/2, (t.y + t.partner.y)/2, { text: '젤라틴 파괴!', color: '#e74c3c' });
                                    }
                                }
                            }
                        });
                    }
                }
                return;
            }

            if (t.type === 'fryer') {
                if (t.cooldown <= 0) {
                    t.cooldown = t.cooldownMax;
                    let angle = t.x < canvas.width / 2 ? 0 : Math.PI;
                    state.projectiles.push({
                        type: 'oil_patch', x: t.x, y: t.y, angle: angle,
                        damage: t.damage * 0.7, width: 140, length: 240, hitWidth: 70,
                        hitList: [], life: 3.2, ripple: 0, flow: 0
                    });
                }
                return;
            }

            if (t.type === 'pyro') {
                let targetValid = t.currentTarget && state.enemies.includes(t.currentTarget) && Math.hypot(t.x - t.currentTarget.x, t.y - t.currentTarget.y) <= t.range;
                
                if (!targetValid) {
                    if (t.currentTarget !== null) {
                        t.currentTarget = null; t.searchDelay = 0.4; 
                        t.laserCharge = 0; t.isFiring = false;
                    }
                }
                
                if (!t.currentTarget) {
                    if (t.searchDelay > 0) {
                        t.searchDelay -= dt;
                    } else {
                        let minDist = t.range; let newTarget = null;
                        state.enemies.forEach(e => {
                            let d = Math.hypot(t.x - e.x, t.y - e.y);
                            if (d <= minDist) { minDist = d; newTarget = e; }
                        });
                        if (newTarget) t.currentTarget = newTarget;
                    }
                }

                if (t.currentTarget) {
                    t.laserCharge = Math.min(10, t.laserCharge + dt * 3.5); t.isFiring = true;
                    t.beamTx = t.currentTarget.x; t.beamTy = t.currentTarget.y;
                    t.targetAngle = Math.atan2(t.currentTarget.y - t.y, t.currentTarget.x - t.x);
                    if (t.cooldown <= 0) {
                        applyDamageToEnemy(t.currentTarget, t.damage + Math.floor(t.laserCharge)); t.cooldown = t.cooldownMax;
                    }
                }
                
                if (t.currentAngle !== undefined && t.currentTarget) {
                    let diff = t.targetAngle - t.currentAngle;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    t.currentAngle += diff * dt * 8; 
                }
                return;
            }

            let target = null;
            if (t.currentTarget && state.enemies.includes(t.currentTarget)) {
                if (Math.hypot(t.x - t.currentTarget.x, t.y - t.currentTarget.y) <= t.range) target = t.currentTarget;
                else { t.laserCharge = 0; t.currentTarget = null; }
            }

            if (!target && t.range > 0) {
                let minDist = t.range;
                state.enemies.forEach(e => {
                    let d = Math.hypot(t.x - e.x, t.y - e.y);
                    if (d <= minDist) { minDist = d; target = e; }
                });
                t.currentTarget = target;
            }

            if (target && t.type !== 'sprinkler' && t.type !== 'log' && t.type !== 'tesla') {
                t.targetAngle = Math.atan2(target.y - t.y, target.x - t.x);
            }
            if (t.currentAngle !== undefined) {
                let diff = t.targetAngle - t.currentAngle;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                t.currentAngle += diff * dt * 8; 
            }

            if (t.type === 'log') {
                if (t.cooldown <= 0) {
                    t.cooldown = t.cooldownMax; let logMaxDistance = 200 + (t.level * 80); 
                    state.projectiles.push({ type: 'log_obj', x: t.x, y: t.y, speed: 120, angle: t.angle, damage: t.damage, hitList: [], distance: 0, maxDistance: logMaxDistance, rotation: 0 });
                } return;
            }

            if (target && t.cooldown <= 0) {
                t.cooldown = t.cooldownMax;
                if (t.type === 'cannon') {
                    state.projectiles.push({ type: 'cannon_ball', x: t.x, y: t.y, speed: 180, target: target, damage: t.damage });
                } else if (t.type === 'shotgun') {
                    applyDamageToEnemy(target, t.damage); createParticle('splash', target.x, target.y, { radius: 22, color: 'rgba(236, 240, 241, 0.8)' });
                    for(let j=0; j<4; j++) createParticle('laser', t.x, t.y, { tx: target.x + (Math.random()-0.5)*25, ty: target.y + (Math.random()-0.5)*25, color: 'rgba(236, 240, 241, 0.6)', width: 3 });
                } else if (t.type === 'mortar') {
                    let dist = Math.hypot(target.x - t.x, target.y - t.y); let duration = Math.max(0.5, dist / 160); 
                    state.projectiles.push({ type: 'mortar_shell', x: t.x, y: t.y, startX: t.x, startY: t.y, tx: target.x, ty: target.y, progress: 0, speed: 1 / duration, damage: t.damage });
                } else if (t.type === 'sprinkler') {
                    state.enemies.forEach(e => {
                        if (Math.hypot(t.x - e.x, t.y - e.y) <= t.range) { 
                            applyWet(e, 3.0, Math.max(0.5, 0.85 - (t.level - 1) * 0.07));
                        }
                    });
                    createParticle('splash', t.x, t.y, { radius: t.range });
                } else if (t.type === 'tesla') {
                    let dmg = target.isWet ? t.damage * 1.6 : t.damage;
                    applyDamageToEnemy(target, dmg); applyStun(target, t.stunDuration || 0.5);
                    createParticle('lightning', t.x, t.y, { tx: target.x, ty: target.y });
                    if (target.isWet) {
                        let chainTarget = null, chainDist = 100;
                        state.enemies.forEach(e => {
                            if (e !== target && Math.hypot(target.x - e.x, target.y - e.y) <= chainDist) { chainDist = Math.hypot(target.x - e.x, target.y - e.y); chainTarget = e; }
                        });
                        if (chainTarget) {
                            applyDamageToEnemy(chainTarget, dmg); applyStun(chainTarget, t.stunDuration || 0.5);
                            createParticle('lightning', target.x, target.y, { tx: chainTarget.x, ty: chainTarget.y });
                        }
                    }
                } else if (t.type === 'crossbow') {
                    state.projectiles.push({ type: 'arrow', x: t.x, y: t.y, speed: 450, target: target, damage: t.damage });
                }
            }
        });
    }

    function drawTowerDesign(ctx, type, renderAngle, tObj = null) {
        switch (type) {
            case 'mine': 
                ctx.fillStyle = '#f368e0'; ctx.beginPath(); ctx.ellipse(2, 0, 3, 5, 0, 0, Math.PI*2); ctx.fill(); 
                ctx.fillStyle = '#222'; ctx.fillRect(-2, -1, 4, 2); 
                break;
            case 'amplifier': 
                ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI*2); ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.stroke(); 
                ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI*2); ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1; ctx.stroke(); 
                break;
            case 'cannon': 
                ctx.rotate(renderAngle); ctx.fillStyle = '#27ae60'; ctx.fillRect(4, -4, 18, 8); 
                break;
            case 'shotgun': 
                ctx.fillStyle = '#bdc3c7'; ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill(); 
                ctx.rotate(renderAngle); ctx.fillStyle = '#34495e'; ctx.fillRect(2, -2, 14, 4); 
                break;
            case 'mortar': 
                ctx.rotate(renderAngle); ctx.fillStyle = '#5d4037'; ctx.fillRect(0, -6, 12, 12); 
                break;
            case 'tesla': 
                ctx.fillStyle = '#7f8c8d'; ctx.fillRect(-8, -6, 16, 12); 
                ctx.strokeStyle = '#34495e'; ctx.lineWidth = 1;
                for(let y = -4; y <= 4; y += 4) { ctx.beginPath(); ctx.moveTo(-6, y); ctx.lineTo(6, y); ctx.stroke(); }
                break;
            case 'pyro': 
                ctx.rotate(renderAngle); 
                ctx.fillStyle = '#3498db'; ctx.fillRect(-4, -6, 8, 12); 
                ctx.fillStyle = '#f1c40f'; ctx.fillRect(4, -2, 6, 4);   
                break;
            case 'crossbow': 
                ctx.rotate(renderAngle); 
                ctx.fillStyle = '#a0522d'; ctx.fillRect(2, -1, 14, 2); 
                ctx.fillStyle = '#f5deb3'; ctx.fillRect(4, -0.5, 12, 1); 
                ctx.beginPath(); ctx.moveTo(12, -6); ctx.lineTo(16, 0); ctx.lineTo(12, 6); 
                ctx.strokeStyle = '#a0522d'; ctx.lineWidth = 1.5; ctx.stroke(); 
                break;
            case 'log': 
                ctx.rotate(renderAngle); 
                ctx.fillStyle = '#e1b12c'; ctx.fillRect(-4, -10, 8, 20); 
                ctx.fillStyle = '#c23616'; ctx.fillRect(-2, -14, 4, 4); ctx.fillRect(-2, 10, 4, 4); 
                break;
            case 'sprinkler': 
                ctx.fillStyle = '#ecf0f1'; ctx.fillRect(-6, -8, 12, 16); 
                ctx.fillStyle = '#3498db'; ctx.fillRect(-4, -6, 8, 5); 
                ctx.fillStyle = '#e74c3c'; ctx.fillRect(-4, 0, 3, 3); 
                ctx.fillStyle = '#3498db'; ctx.fillRect(1, 0, 3, 3); 
                break;
            case 'fryer':
                ctx.rotate(renderAngle);
                ctx.fillStyle = '#7f8c8d'; ctx.fillRect(-6, -8, 12, 16); 
                ctx.fillStyle = '#d35400'; ctx.fillRect(3, -4, 6, 8); 
                ctx.fillStyle = '#f39c12'; ctx.beginPath(); ctx.arc(-2, 0, 4, 0, Math.PI*2); ctx.fill();
                break;
            case 'gelatin':
                ctx.fillStyle = '#9b59b6';
                ctx.beginPath();
                ctx.moveTo(-6, 8);
                ctx.lineTo(-4, -6);
                ctx.quadraticCurveTo(0, -10, 4, -6);
                ctx.lineTo(6, 8);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.beginPath();
                ctx.ellipse(-2, -2, 2, 4, Math.PI/4, 0, Math.PI*2);
                ctx.fill();
                break;
        }
    }

    function draw() {
        ctx.fillStyle = '#27ae60'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const checkPathX = canvas.width / 2;

        if (state.environmentProps) {
            state.environmentProps.forEach(prop => {
                ctx.save(); ctx.translate(prop.x, prop.y);
                if (prop.type === 0) {
                    ctx.strokeStyle = '#1e824c'; ctx.lineWidth = 1.5; ctx.beginPath();
                    ctx.moveTo(0, 0); ctx.lineTo(-3, -7); ctx.moveTo(0, 0); ctx.lineTo(0, -9); ctx.moveTo(0, 0); ctx.lineTo(3, -6); ctx.stroke();
                } else if (prop.type === 1) {
                    ctx.fillStyle = '#1e824c'; ctx.fillRect(-0.5, -3, 1, 3);
                    ctx.fillStyle = prop.color; ctx.beginPath(); ctx.arc(0, -4, 2.5, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, -4, 0.8, 0, Math.PI*2); ctx.fill();
                } else {
                    ctx.fillStyle = '#95a5a6'; ctx.beginPath(); ctx.ellipse(0, 0, 3.5, 1.8, 0, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();
            });
        }

        ctx.fillStyle = '#8b5a2b'; ctx.fillRect(checkPathX - 30, 0, 60, canvas.height);
        ctx.fillStyle = '#7f8c8d';
        for (let y = 0; y < canvas.height + 20; y += 16) {
            ctx.fillRect(checkPathX - 34, y - 8, 5, 11); ctx.fillRect(checkPathX + 29, y - 8, 5, 11); 
        }

        ctx.fillStyle = '#704214';
        for (let y = 15; y < canvas.height + 40; y += 45) {
            ctx.beginPath();
            ctx.arc(checkPathX - 12, y, 4, 0, Math.PI * 2); ctx.arc(checkPathX + 15, y - 20, 5, 0, Math.PI * 2);
            ctx.arc(checkPathX + 2, y - 10, 3, 0, Math.PI * 2); ctx.fill();
        }

        state.towers.forEach(t => {
            if (t.type === 'gelatin' && t.isCompleted && t.partner && t.x < t.partner.x) {
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(t.x, t.y);
                ctx.lineTo(t.partner.x, t.partner.y);
                
                if (t.inactiveTimer > 0) {
                    ctx.strokeStyle = 'rgba(155, 89, 182, 0.2)';
                    ctx.lineWidth = 3;
                    ctx.setLineDash([4, 4]);
                    ctx.stroke();
                } else {
                    let pulse = Math.sin(Date.now() * 0.015) * 1.5;
                    ctx.strokeStyle = 'rgba(155, 89, 182, 0.5)';
                    ctx.lineWidth = 8 + pulse;
                    ctx.stroke();
                    
                    ctx.strokeStyle = 'rgba(215, 189, 226, 0.8)';
                    ctx.lineWidth = 2.5;
                    ctx.stroke();
                }
                ctx.setLineDash([]);
                ctx.restore();
            }
        });

        state.towers.forEach(t => {
            if (t.isBuffed) {
                ctx.beginPath(); ctx.arc(t.x, t.y, t.radius + 3, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(243, 156, 18, 0.8)'; ctx.lineWidth = 3; ctx.stroke();
            }

            if (t.type === 'pyro' && t.isFiring) {
                ctx.save(); ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(t.beamTx, t.beamTy);
                ctx.strokeStyle = 'rgba(230, 126, 34, 0.35)'; ctx.lineWidth = t.laserCharge + 8 + Math.sin(Date.now() * 0.06) * 3; ctx.stroke();
                ctx.strokeStyle = '#e67e22'; ctx.lineWidth = t.laserCharge + 3; ctx.stroke();
                ctx.strokeStyle = '#f1c40f'; ctx.lineWidth = t.laserCharge / 2 + 1; ctx.stroke(); ctx.restore();
            }

            ctx.beginPath(); ctx.arc(t.x, t.y, t.radius, 0, Math.PI * 2);
            ctx.fillStyle = t.color; ctx.fill(); ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 2.5; ctx.stroke();

            ctx.save(); ctx.translate(t.x, t.y);
            let renderAngle = t.type === 'log' ? t.angle : (t.currentAngle !== undefined ? t.currentAngle : 0);
            drawTowerDesign(ctx, t.type, renderAngle, t);
            ctx.restore();

            ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.font = 'bold 9px Arial';
            ctx.textAlign = 'center'; ctx.fillText(`L${t.level}`, t.x, t.y + 14);

            if (t.type === 'log' && state.settingAngleMode && state.selectedTower === t) {
                let logMaxDist = 200 + (t.level * 80);
                ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(t.x + Math.cos(t.angle) * 35, t.y + Math.sin(t.angle) * 35);
                ctx.strokeStyle = '#d35400'; ctx.lineWidth = 4; ctx.stroke();
                ctx.beginPath(); ctx.setLineDash([4, 4]); ctx.moveTo(t.x, t.y);
                ctx.lineTo(t.x + Math.cos(t.angle) * logMaxDist, t.y + Math.sin(t.angle) * logMaxDist);
                ctx.strokeStyle = 'rgba(211, 84, 0, 0.7)'; ctx.lineWidth = 2; ctx.stroke(); ctx.setLineDash([]);
            }

            if (state.selectedTower === t && t.range > 0) {
                ctx.beginPath(); ctx.arc(t.x, t.y, t.range, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)'; ctx.fill(); ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.stroke();
            }
        });

        if (state.isDraggingCard && state.dragCardType) {
            let def = TOWER_DEFS[state.dragCardType];
            let px = state.dragX; let py = state.dragY;
            const isCanceled = state.dragClientY > canvas.getBoundingClientRect().bottom || px < 0 || px > canvas.width;
            
            ctx.save();
            if (state.dragCardType === 'gelatin' && state.pendingGelatin && !isCanceled) {
                ctx.beginPath(); ctx.arc(state.pendingGelatin.x, state.pendingGelatin.y, 160, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(155, 89, 182, 0.08)'; ctx.fill();
                ctx.strokeStyle = 'rgba(155, 89, 182, 0.3)'; ctx.lineWidth = 1; ctx.stroke();
                
                ctx.beginPath(); ctx.moveTo(state.pendingGelatin.x, state.pendingGelatin.y);
                ctx.lineTo(px, py);
                let d = Math.hypot(state.pendingGelatin.x - px, state.pendingGelatin.y - py);
                let isValidPair = d <= 160 && d >= 40 && !isLineNearAnyTower(state.pendingGelatin.x, state.pendingGelatin.y, px, py, state.pendingGelatin, null);
                ctx.strokeStyle = isValidPair ? 'rgba(155, 89, 182, 0.6)' : 'rgba(231, 76, 60, 0.6)';
                ctx.lineWidth = 3;
                ctx.setLineDash([4, 4]);
                ctx.stroke();
                ctx.setLineDash([]);
            } else if (def.range > 0 && !isCanceled) {
                ctx.beginPath(); ctx.arc(px, py, def.range, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)'; ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)'; ctx.lineWidth = 1; ctx.stroke();
            }

            ctx.globalAlpha = 0.6;
            ctx.beginPath(); ctx.arc(px, py, def.radius, 0, Math.PI * 2);
            let canBuildHere = canBuild(px, py, def.radius);
            ctx.fillStyle = isCanceled || !canBuildHere ? '#e74c3c' : def.color; 
            ctx.fill(); ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 2.5; ctx.stroke();

            ctx.translate(px, py);
            let renderAngle = def.angle || -Math.PI / 2;
            drawTowerDesign(ctx, state.dragCardType, renderAngle, null);
            ctx.restore();
        }

        state.enemies.forEach(e => {
            ctx.save(); ctx.translate(e.x, e.y);
            if (e.type === 'shield') {
                ctx.beginPath(); ctx.arc(0, 0, 70, 0, Math.PI*2);
                ctx.strokeStyle = '#3498db'; ctx.setLineDash([5, 5]); ctx.lineWidth = 2; ctx.stroke(); ctx.setLineDash([]);
            }
            ctx.font = `${e.radius * 1.8}px Apple Color Emoji, Segoe UI Emoji`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(e.emoji, 0, 0);
            if (e.stunTimer > 0) { ctx.font = 'bold 11px Arial'; ctx.fillText('⚡', -12, -12); }
            if (e.isWet) { ctx.font = '10px Arial'; ctx.fillText('💧', 12, -12); }
            if (e.oilTimer > 0) { ctx.font = '10px Arial'; ctx.fillText('🍳', 12, 12); }
            if (e.shieldHp > 0) { ctx.font = '10px Arial'; ctx.fillText('🛡️', -12, 12); }
            ctx.restore();

            let ratio = Math.max(0, e.hp / e.maxHp);
            ctx.fillStyle = '#e74c3c'; ctx.fillRect(e.x - 10, e.y - e.radius - 8, 20, 3.5);
            ctx.fillStyle = '#2ecc71'; ctx.fillRect(e.x - 10, e.y - e.radius - 8, 20 * ratio, 3.5);
            if (e.shieldHp > 0) {
                let shieldRatio = Math.max(0, Math.min(1, e.shieldHp / Math.max(e.maxHp, 1)));
                ctx.fillStyle = 'rgba(52, 152, 219, 0.35)';
                ctx.fillRect(e.x - 10, e.y - e.radius - 12, 20, 2.5);
                ctx.fillStyle = '#3498db';
                ctx.fillRect(e.x - 10, e.y - e.radius - 12, 20 * shieldRatio, 2.5);
            }
        });

        state.projectiles.forEach(p => {
            if (p.type === 'cannon_ball') {
                ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fillStyle = '#2ecc71'; ctx.fill(); 
            } else if (p.type === 'mortar_shell') {
                ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI * 2); ctx.fillStyle = '#795548'; ctx.fill(); 
                ctx.strokeStyle = '#3e2723'; ctx.lineWidth = 1; ctx.stroke();
            } else if (p.type === 'arrow') {
                ctx.save(); ctx.translate(p.x, p.y);
                let angle = p.target ? Math.atan2(p.target.y - p.y, p.target.x - p.x) : 0; ctx.rotate(angle);
                ctx.fillStyle = '#f5deb3'; ctx.fillRect(-6, -1, 12, 2); 
                ctx.restore();
            } else if (p.type === 'log_obj') {
                ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle); 
                ctx.fillStyle = '#e1b12c'; ctx.fillRect(-6, -16, 12, 32); 
                ctx.fillStyle = '#c23616'; ctx.fillRect(-3, -20, 6, 4); ctx.fillRect(-3, 16, 6, 4); 
                ctx.restore();
            } else if (p.type === 'oil_patch') {
                ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle);
                let width = p.width || 140;
                let height = p.length || 240;
                let wobble = Math.sin(p.ripple || 0) * 8;
                ctx.fillStyle = 'rgba(243, 156, 18, 0.35)';
                ctx.beginPath();
                ctx.moveTo(0, -width / 2);
                ctx.lineTo(height, -width / 2 + wobble * 0.3);
                ctx.quadraticCurveTo(height + 12, 0, height, width / 2 - wobble * 0.3);
                ctx.lineTo(0, width / 2);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = 'rgba(231, 76, 60, 0.24)';
                ctx.beginPath();
                ctx.moveTo(8, -width / 2 + 10);
                ctx.lineTo(height - 8, -width / 2 + 6);
                ctx.lineTo(height - 8, width / 2 - 6);
                ctx.lineTo(8, width / 2 - 10);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 195, 80, 0.7)'; ctx.lineWidth = 1.2;
                ctx.beginPath();
                ctx.moveTo(6, -width / 2 + 6);
                ctx.lineTo(height - 10, -width / 2 + 8);
                ctx.moveTo(6, width / 2 - 6);
                ctx.lineTo(height - 10, width / 2 - 8);
                ctx.stroke();
                ctx.restore();
            }
        });

        state.particles.forEach(p => {
            ctx.save(); ctx.globalAlpha = Math.max(0, p.life);
            if (p.type === 'text') {
                ctx.fillStyle = p.color; ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center'; ctx.fillText(p.text, p.x, p.y - (1 - p.life) * 15);
            } else if (p.type === 'laser') {
                ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.tx, p.ty);
                ctx.strokeStyle = p.color; ctx.lineWidth = p.width || 1.5; ctx.stroke();
            } else if (p.type === 'lightning') {
                ctx.beginPath(); ctx.moveTo(p.x, p.y);
                let midX = (p.x + p.tx)/2 + (Math.random()-0.5)*18; let midY = (p.y + p.ty)/2 + (Math.random()-0.5)*18;
                ctx.lineTo(midX, midY); ctx.lineTo(p.tx, p.ty);
                ctx.strokeStyle = '#f1c40f'; ctx.lineWidth = 2.5; ctx.stroke();
            } else if (p.type === 'splash') {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius * (1 - p.life), 0, Math.PI*2);
                ctx.fillStyle = p.color || `rgba(52, 152, 219, ${p.life * 0.45})`; ctx.fill();
            } else if (p.type === 'explosion') {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius * (1 - p.life), 0, Math.PI*2);
                ctx.fillStyle = `rgba(230, 126, 34, ${p.life * 0.7})`; ctx.fill();
            }
            ctx.restore();
        });

        if (!state.isWaveActive && state.waveDelay > 0) {
            ctx.fillStyle = 'white'; ctx.font = 'bold 22px "Segoe UI", Arial, sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(`웨이브 ${state.wave} 준비 중`, canvas.width/2, canvas.height/2 - 10);
            ctx.font = '14px "Segoe UI", Arial, sans-serif'; ctx.fillText(`${Math.ceil(state.waveDelay)}초 후 시작합니다`, canvas.width/2, canvas.height/2 + 18);
        }
    }

    function loop(time) {
        let dt = (time - state.lastTime) / 1000;
        if (state.isPaused) {
            draw(); state.lastTime = time; requestAnimationFrame(loop); return;
        }
        state.lastTime = time;
        if (dt < 0.1) { update(dt); draw(); }
        requestAnimationFrame(loop);
    }
    
    if (!loadGame()) { generateWave(state.wave); } else { generateWave(state.wave); }
    saveGame();
    requestAnimationFrame(loop);
</script>
</body>
</html>
