<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>디펜스 밥 (Defense BOB)</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐥</text></svg>">
    <style>
        *, *:before, *:after { box-sizing: border-box; }
        :root {
            --bg-color: #2c3e50; --panel-bg: #34495e;
            --money-color: #f1c40f; --primary: #e74c3c;
            --text-light: #ecf0f1; --tab-active: #3498db;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none;
        }
        #game-wrapper {
            position: relative; width: 100%; height: 100%; max-width: 500px; margin: 0 auto;
            display: flex; flex-direction: column; background: #27ae60; overflow: hidden;
        }
        #top-ui {
            background: var(--panel-bg); color: var(--text-light); padding: 10px 15px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 10; flex-shrink: 0;
            position: relative;
        }
        .title-text {
            font-size: 20px; font-weight: 900; color: #f1c40f; 
            text-shadow: 2px 2px 0px #1a252f, -1px -1px 0px #1a252f;
            position: absolute; left: 50%; transform: translateX(-50%);
            white-space: nowrap; letter-spacing: 1px;
        }
        .stat-box { font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 4px; }
        .money-text { color: var(--money-color); font-size: 15px; margin-right: 6px; }
        .btn-reset-top {
            background: #e74c3c; color: white; border: none; padding: 4px 6px;
            border-radius: 4px; font-weight: bold; font-size: 11px; cursor: pointer; transition: 0.2s;
        }
        .btn-reset-top:active { background: #c0392b; }
        canvas { flex: 1; width: 100%; height: 0; display: block; }
        #bottom-ui {
            background: #ecf0f1; box-shadow: 0 -4px 6px rgba(0,0,0,0.1);
            z-index: 10; display: flex; flex-direction: column; flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom); position: relative;
        }
        #normal-bottom { display: flex; flex-direction: column; width: 100%; }
        #tab-menu { display: flex; background: #bdc3c7; }
        .tab-btn {
            flex: 1; padding: 10px 0; border: none; background: none;
            font-weight: bold; font-size: 14px; color: #7f8c8d; cursor: pointer; transition: 0.2s;
        }
        .tab-btn.active { background: #ecf0f1; color: var(--tab-active); border-top: 3px solid var(--tab-active); }
        #build-menu { display: flex; gap: 6px; padding: 10px 8px; overflow-x: auto; flex-shrink: 0; position: relative; }
        #upgrade-menu {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 8px; gap: 4px; height: auto;
        }
        #angle-ui { display: none; flex-direction: column; padding: 12px; gap: 8px; }

        .card {
            background: white; border: 2px solid #bdc3c7; border-radius: 8px;
            padding: 6px; width: 68px; height: 60px; text-align: center; font-size: 12px;
            font-weight: bold; color: #2c3e50; flex-shrink: 0; display: flex; flex-direction: column; justify-content: space-evenly;
            position: relative; cursor: grab;
            letter-spacing: -0.5px;
        }
        .card:active { cursor: grabbing; }
        .card.disabled { opacity: 0.4; filter: grayscale(1); pointer-events: none; }
        .card-cost { color: var(--money-color); font-size: 11px; }

        .action-btn { padding: 6px 12px; border: none; border-radius: 6px; font-weight: bold; font-size: 12px; color: white; width: 95%; cursor: pointer; }
        .btn-upgrade { background: #2ecc71; }
        .btn-upgrade:active { background: #27ae60; }
        .btn-upgrade.disabled { background: #95a5a6; opacity: 0.7; pointer-events: none; }
        .btn-action { background: #3498db; }
        .btn-action:active { background: #2980b9; }
        .btn-sell { background: #e67e22; }
        .btn-cancel { background: #95a5a6; }
        .btn-cancel:active { background: #7f8c8d; }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 20; text-align: center;
        }
        .overlay h1 { color: #e74c3c; margin-bottom: 10px; }
        .overlay p { font-size: 16px; margin-bottom: 20px; line-height: 1.5; }
        #upgrade-details {
            font-size: 11px; color: #7f8c8d; width: 95%; background: #f8f9f9;
            border: 1px solid #d5dbdb; border-radius: 4px; padding: 6px; margin: 2px 0 6px 0; line-height: 1.4; text-align: left;
        }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 2px; }
        .stat-up { color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="game-over-overlay" class="overlay">
        <h1>STAGE FAILED</h1>
        <p id="fail-wave-text">웨이브 방어 실패!<br><span style="font-size: 13px; color: #bdc3c7;">(건설한 방어탑은 그대로 유지됩니다)</span></p>
        <button class="action-btn btn-upgrade" id="btn-retry-wave" style="width: 260px;" onclick="retryWave(false)">현재 웨이브 재도전 (3초)</button>
        <button class="action-btn btn-cancel" style="width: 260px; margin-top: 10px;" onclick="retryWave(true)">⏪ 이전 웨이브로 돌아가기</button>
    </div>

    <div id="top-ui">
        <div class="stat-box">웨이브 <span id="wave-text">1</span></div>
        <div class="title-text">Defense BOB</div>
        <div style="display:flex; align-items:center;">
            <div class="stat-box money-text">💰 <span id="money-text">0</span></div>
            <button class="btn-reset-top" onclick="triggerReset()">🔄</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="bottom-ui">
        <div id="normal-bottom">
            <div id="tab-menu">
                <button class="tab-btn active" onclick="switchTab('damage')">⚔️ 피해</button>
                <button class="tab-btn" onclick="switchTab('utility')">🛡️ 보조</button>
                <button class="tab-btn" onclick="switchTab('resource')">💎 자원</button>
            </div>

            <div id="build-menu">
                <div class="card" data-category="damage" data-type="cannon">완두콩<br>발사대<div class="card-cost">💰 40</div></div>
                <div class="card" data-category="damage" data-type="shotgun">압력솥<div class="card-cost">💰 80</div></div>
                <div class="card" data-category="damage" data-type="mortar">코코넛<br>발사기<div class="card-cost">💰 130</div></div>
                <div class="card" data-category="damage" data-type="tesla">전기 구이<div class="card-cost">💰 180</div></div>
                <div class="card" data-category="damage" data-type="pyro">토치<div class="card-cost">💰 220</div></div>
                <div class="card" data-category="damage" data-type="crossbow">이쑤시개<br>발사기<div class="card-cost">💰 250</div></div>
                
                <div class="card" data-category="utility" data-type="sprinkler" style="display:none;">정수기<div class="card-cost">💰 50</div></div>
                <div class="card" data-category="utility" data-type="log" style="display:none;">밀대<div class="card-cost">💰 150</div></div>
                <div class="card" data-category="utility" data-type="amplifier" style="display:none;">증폭기<div class="card-cost">💰 100</div></div>

                <div class="card" data-category="resource" data-type="mine" style="display:none;">돼지<br>저금통<div class="card-cost">💰 60</div></div>
            </div>

            <div id="upgrade-menu">
                <div id="upgrade-info" style="font-weight: bold; color: #2c3e50; font-size:13px;">방어탑 정보</div>
                <div id="upgrade-details"></div>
                <button class="action-btn btn-upgrade" id="btn-do-upgrade">업그레이드 (💰 ?)</button>
                <button class="action-btn btn-action" id="btn-set-angle" style="display:none; margin-bottom:4px;">🪵 발사 방향 재설정</button>
                <button class="action-btn btn-sell" id="btn-sell-tower" style="margin-bottom:4px;">🔨 방어탑 판매 (💰 ?)</button>
                <button class="action-btn btn-cancel" id="btn-cancel-upgrade">취소</button>
            </div>
        </div>

        <div id="angle-ui">
            <div style="text-align:center; font-size:13px; font-weight:bold; color:#2c3e50; margin-bottom: 4px;">
                👆 화면을 누르거나 드래그하여 방향을 바꾸세요
            </div>
            <button class="action-btn btn-upgrade" style="width: 100%; height:42px; font-size:14px;" onclick="finishAngleSetting()">✅ 방향 설정 완료</button>
        </div>
    </div>
</div>

<script>
    const SAVE_KEY = 'defense_bob_save_v3';
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const state = {
        money: 150, hp: 1, wave: 1, isGameOver: false,
        towers: [], enemies: [], particles: [], projectiles: [],
        enemiesToSpawn: [], spawnTimer: 0, waveDelay: 3.0, isWaveActive: false,
        selectedTower: null, settingAngleMode: false, isDraggingAngle: false,
        isDraggingCard: false, dragCardType: null, dragX: 0, dragY: 0, dragClientY: 0,
        lastTime: performance.now(), autoRetryInterval: null, environmentProps: [] 
    };

    const TOWER_DEFS = {
        mine:      { name: '돼지저금통', cost: 60, radius: 15, color: '#ff9ff3', range: 0, cooldownMax: 6.0, prod: 2, upCost: 50 },
        cannon:    { name: '완두콩 발사대', cost: 40, radius: 15, color: '#2ecc71', range: 110, cooldownMax: 1.2, damage: 20, upCost: 40 }, 
        shotgun:   { name: '압력솥', cost: 80, radius: 14, color: '#bdc3c7', range: 55, cooldownMax: 1.0, damage: 35, upCost: 70 },
        mortar:    { name: '코코넛 발사기', cost: 130, radius: 16, color: '#8d6e63', range: 180, cooldownMax: 2.5, damage: 25, upCost: 110 },
        sprinkler: { name: '정수기', cost: 50, radius: 14, color: '#ecf0f1', range: 90, cooldownMax: 1.5, damage: 0, upCost: 45 },
        tesla:     { name: '전기 구이', cost: 180, radius: 14, color: '#95a5a6', range: 120, cooldownMax: 1.6, damage: 17.5, upCost: 150, stunDuration: 0.5 },
        log:       { name: '밀대', cost: 150, radius: 16, color: '#e1b12c', range: 0, cooldownMax: 6.5, damage: 0, upCost: 80, angle: -Math.PI / 2 },
        pyro:      { name: '토치', cost: 220, radius: 15, color: '#3498db', range: 80, cooldownMax: 0.1, damage: 0.54, upCost: 180 },
        crossbow:  { name: '이쑤시개 발사기', cost: 250, radius: 13, color: '#d1ccc0', range: 240, cooldownMax: 0.2, damage: 6, upCost: 200 },
        amplifier: { name: '증폭기', cost: 100, radius: 14, color: '#f39c12', range: 80, cooldownMax: 0, damage: 0, upCost: 90 }
    };

    const ENEMY_DEFS = {
        goblin:  { speed: 55, maxHp: 24, radius: 12, emoji: '🐥', reward: 6 },
        wolf:    { speed: 95, maxHp: 15, radius: 10, emoji: '🍜', reward: 5 },
        golem:   { speed: 28, maxHp: 380, radius: 16, emoji: '🍔', reward: 28 },
        scout:   { speed: 125, maxHp: 13, radius: 9, emoji: '🍬', reward: 4 },
        shield:  { speed: 35, maxHp: 190, radius: 14, emoji: '🍞', reward: 15 },
        healer:  { speed: 42, maxHp: 85, radius: 13, emoji: '🥤', reward: 20 }
    };

    function saveGame() {
        if (state.isGameOver) return;
        const saveData = {
            wave: state.wave, money: state.money,
            towers: state.towers.map(t => ({
                x: t.x, y: t.y, type: t.type, level: t.level, totalCost: t.totalCost,
                damage: t.damage, cooldownMax: t.cooldownMax, range: t.range, 
                angle: t.angle, prod: t.prod, stunDuration: t.stunDuration
            }))
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
    }

    function loadGame() {
        const saved = localStorage.getItem(SAVE_KEY);
        if (saved) {
            try {
                const data = JSON.parse(saved);
                state.wave = data.wave; state.money = data.money;
                state.towers = data.towers.map(t => ({
                    ...TOWER_DEFS[t.type], ...t,
                    cooldown: 0, laserCharge: 0, currentTarget: null, isFiring: false, searchDelay: 0
                }));
                return true;
            } catch (e) { console.error('Save loaded failed', e); }
        }
        return false;
    }

    window.triggerReset = function() {
        if (confirm("정말 게임을 완전히 초기화하시겠습니까?\n모든 골드, 배치와 웨이브 진행도가 리셋됩니다.")) {
            localStorage.removeItem(SAVE_KEY); location.reload();
        }
    };

    function initEnvironment() {
        state.environmentProps = []; const checkPathX = canvas.width / 2 || 250;
        for (let i = 0; i < 40; i++) {
            let x = Math.random() * canvas.width; let y = Math.random() * canvas.height;
            while (Math.abs(x - checkPathX) < 45) { x = Math.random() * canvas.width; }
            let type = Math.floor(Math.random() * 3);
            let color = '#fff'; if (type === 1) color = Math.random() > 0.5 ? '#f1c40f' : '#e74c3c';
            state.environmentProps.push({ x, y, type, color });
        }
    }

    function resizeCanvas() {
        canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight;
        if (state.environmentProps.length === 0) initEnvironment(); 
    }
    window.addEventListener('resize', resizeCanvas); setTimeout(resizeCanvas, 50);

    window.switchTab = function(category) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.querySelectorAll('.card').forEach(card => {
            if (card.dataset.category === category) card.style.display = 'flex';
            else card.style.display = 'none';
        });
        setTimeout(resizeCanvas, 5);
    };

    window.retryWave = function(goPrevious = false) {
        if (state.autoRetryInterval) { clearInterval(state.autoRetryInterval); state.autoRetryInterval = null; }
        if (goPrevious) state.wave = Math.max(1, state.wave - 1);
        state.hp = 1; state.enemies = []; state.projectiles = []; state.particles = [];
        state.isGameOver = false; state.isDraggingCard = false;
        document.getElementById('game-over-overlay').style.display = 'none';
        closeUpgradeMenu(); generateWave(state.wave); saveGame();
    };

    function generateWave(waveNum) {
        let spawnList = [];
        const hpMultiplier = Math.pow(1.25, waveNum - 1); 
        const speedMultiplier = 1 + (waveNum - 1) * 0.02; 
        
        let goblinCount = 5 + Math.floor(waveNum * 1.5);
        for(let i=0; i<goblinCount; i++) spawnList.push({ type: 'goblin', hpMult: hpMultiplier, speedMult: speedMultiplier });

        if (waveNum >= 2) {
            let scoutCount = 4 + Math.floor(waveNum * 1.2);
            for(let i=0; i<scoutCount; i++) spawnList.push({ type: 'scout', hpMult: hpMultiplier, speedMult: speedMultiplier });
            let wolfCount = 3 + Math.floor(waveNum * 1.0);
            for(let i=0; i<wolfCount; i++) spawnList.push({ type: 'wolf', hpMult: hpMultiplier, speedMult: speedMultiplier });
        }
        if (waveNum >= 3) {
            let shieldCount = 2 + Math.floor(waveNum * 0.8);
            for(let i=0; i<shieldCount; i++) spawnList.push({ type: 'shield', hpMult: hpMultiplier, speedMult: speedMultiplier });
            let golemCount = Math.floor(waveNum / 2);
            for(let i=0; i<golemCount; i++) spawnList.push({ type: 'golem', hpMult: hpMultiplier, speedMult: speedMultiplier });
        }
        if (waveNum >= 4) {
            let healerCount = 1 + Math.floor(waveNum / 3);
            for(let i=0; i<healerCount; i++) spawnList.push({ type: 'healer', hpMult: hpMultiplier, speedMult: speedMultiplier });
        }

        spawnList.sort(() => Math.random() - 0.5); state.enemiesToSpawn = spawnList; state.isWaveActive = true;
    }

    function createParticle(type, x, y, options = {}) {
        state.particles.push({ type, x, y, life: 1.0, ...options });
    }

    // 드래그 앤 드롭
    document.querySelectorAll('.card').forEach(card => {
        const type = card.dataset.type;
        const startDrag = (e) => {
            if (state.isGameOver || state.money < TOWER_DEFS[type].cost) return;
            state.isDraggingCard = true; state.dragCardType = type;
            closeUpgradeMenu(); updateDragPos(e);
        };
        card.addEventListener('mousedown', startDrag);
        card.addEventListener('touchstart', (e) => { e.preventDefault(); startDrag(e.touches[0]); }, {passive: false});
    });

    function updateDragPos(e) {
        if (!state.isDraggingCard) return;
        const rect = canvas.getBoundingClientRect();
        let clientX = e.clientX || (e.touches && e.touches[0].clientX);
        let clientY = e.clientY || (e.touches && e.touches[0].clientY);
        state.dragClientY = clientY;
        state.dragX = (clientX - rect.left) * (canvas.width / rect.width);
        state.dragY = (clientY - rect.top) * (canvas.height / rect.height);
    }

    window.addEventListener('mousemove', e => updateDragPos(e));
    window.addEventListener('touchmove', e => { if (state.isDraggingCard) updateDragPos(e.touches[0]); }, {passive: false});

    function handleDragEnd() {
        if (state.isDraggingCard) {
            const rect = canvas.getBoundingClientRect(); state.isDraggingCard = false;
            
            if (state.dragClientY > rect.bottom || state.dragX < 0 || state.dragX > canvas.width) {
                createParticle('text', canvas.width / 2, canvas.height - 30, {text: '설치 취소됨', color: '#95a5a6'});
            } else {
                let def = TOWER_DEFS[state.dragCardType];
                if (state.dragCardType === 'mine' && state.towers.filter(t => t.type === 'mine').length >= 10) {
                    createParticle('text', state.dragX, state.dragY, { text: '돼지저금통 최대 10개!', color: '#e74c3c' });
                } else if (canBuild(state.dragX, state.dragY, def.radius)) {
                    buildTower(state.dragCardType, state.dragX, state.dragY);
                } else {
                    createParticle('text', state.dragX, state.dragY, { text: '설치 불가!', color: '#e74c3c' });
                }
            }
            state.dragCardType = null;
        }
    }
    window.addEventListener('mouseup', handleDragEnd);
    window.addEventListener('touchend', handleDragEnd);

    function canBuild(tx, ty, radius) {
        const checkPathX = canvas.width / 2;
        if (Math.abs(tx - checkPathX) < 40) return false;
        return state.towers.every(t => Math.hypot(t.x - tx, t.y - ty) > (t.radius + radius + 5));
    }

    function buildTower(type, x, y) {
        let def = TOWER_DEFS[type];
        state.money -= def.cost;
        let newTower = {
            x: x, y: y, type: type, level: 1, cooldown: 0, laserCharge: 0, searchDelay: 0,
            currentTarget: null, totalCost: def.cost, isFiring: false, beamTx: 0, beamTy: 0,
            angle: def.angle || -Math.PI / 2, targetAngle: def.angle || -Math.PI / 2, currentAngle: def.angle || -Math.PI / 2, 
            isBuffed: false, speedMult: 1.0, ...def
        };
        state.towers.push(newTower);
        createParticle('text', x, y, { text: '-💰' + def.cost, color: '#e74c3c' });
        saveGame();
    }

    const handleDown = (clientX, clientY) => {
        if (state.isGameOver || state.isDraggingCard) return;
        const rect = canvas.getBoundingClientRect();
        const tx = (clientX - rect.left) * (canvas.width / rect.width);
        const ty = (clientY - rect.top) * (canvas.height / rect.height);

        if (state.settingAngleMode && state.selectedTower && state.selectedTower.type === 'log') {
            state.isDraggingAngle = true; 
            state.selectedTower.angle = Math.atan2(ty - state.selectedTower.y, tx - state.selectedTower.x);
            return;
        }

        let clickedTower = null;
        for (let tower of state.towers) {
            if (Math.hypot(tower.x - tx, tower.y - ty) <= tower.radius + 15) { clickedTower = tower; break; }
        }
        if (clickedTower) openUpgradeMenu(clickedTower); else closeUpgradeMenu();
    };

    const handleMove = (clientX, clientY) => {
        if (state.settingAngleMode && state.isDraggingAngle && state.selectedTower) {
            const rect = canvas.getBoundingClientRect();
            const tx = (clientX - rect.left) * (canvas.width / rect.width);
            const ty = (clientY - rect.top) * (canvas.height / rect.height);
            state.selectedTower.angle = Math.atan2(ty - state.selectedTower.y, tx - state.selectedTower.x);
        }
    };

    const handleUp = () => { if (state.settingAngleMode) state.isDraggingAngle = false; };

    canvas.addEventListener('mousedown', e => handleDown(e.clientX, e.clientY));
    canvas.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
    window.addEventListener('mouseup', handleUp);
    canvas.addEventListener('touchstart', e => { if(e.touches[0].clientY < canvas.getBoundingClientRect().bottom) { e.preventDefault(); handleDown(e.touches[0].clientX, e.touches[0].clientY); } }, { passive: false });
    canvas.addEventListener('touchmove', e => { if(e.touches[0].clientY < canvas.getBoundingClientRect().bottom) { e.preventDefault(); handleMove(e.touches[0].clientX, e.touches[0].clientY); } }, { passive: false });
    window.addEventListener('touchend', e => handleUp());

    function openUpgradeMenu(tower) {
        state.selectedTower = tower;
        document.getElementById('tab-menu').style.display = 'none';
        document.getElementById('build-menu').style.display = 'none';
        document.getElementById('upgrade-menu').style.display = 'flex';
        document.getElementById('btn-set-angle').style.display = tower.type === 'log' ? 'block' : 'none';
        updateUpgradeUI(); setTimeout(resizeCanvas, 5);
    }

    function closeUpgradeMenu() {
        state.selectedTower = null; state.settingAngleMode = false; state.isDraggingAngle = false;
        document.getElementById('normal-bottom').style.display = 'flex';
        document.getElementById('angle-ui').style.display = 'none';
        document.getElementById('tab-menu').style.display = 'flex';
        document.getElementById('build-menu').style.display = 'flex';
        document.getElementById('upgrade-menu').style.display = 'none';
        setTimeout(resizeCanvas, 5);
    }

    function updateUpgradeUI() {
        if (!state.selectedTower) return;
        let t = state.selectedTower; let cost = t.upCost * t.level; let refund = Math.floor(t.totalCost * 0.6);
        
        document.getElementById('upgrade-info').innerHTML = `Lv.${t.level} ➡️ <span style="color:#2ecc71;">Lv.${t.level + 1}</span> ${t.name}`;
        let btn = document.getElementById('btn-do-upgrade'); btn.innerText = `업그레이드 (💰 ${cost})`;
        document.getElementById('btn-sell-tower').innerText = `🔨 판매 (💰 +${refund})`;
        if (state.money < cost) btn.classList.add('disabled'); else btn.classList.remove('disabled');

        let detailsHtml = '';
        if (t.type === 'mine') {
            detailsHtml += `<div class="stat-row"><span>골드 생산량:</span> <span>💰 ${t.prod} ➡️ <span class="stat-up">💰 ${t.prod + 1}</span></span></div>`;
            detailsHtml += `<div class="stat-row"><span>생산 대기시간:</span> <span>${t.cooldownMax.toFixed(2)}초 ➡️ <span class="stat-up">${Math.max(1.0, t.cooldownMax * 0.9).toFixed(2)}초</span></span></div>`;
        } else if (t.type === 'amplifier') {
            let curBuff = Math.min(50, 10 + (t.level - 1) * 5); let nextBuff = Math.min(50, curBuff + 5); let cap = nextBuff >= 50 ? ' (MAX)' : '';
            detailsHtml += `<div class="stat-row"><span>공격 속도 증가:</span> <span>📈 +${curBuff}% ➡️ <span class="stat-up">📈 +${nextBuff}%${cap}</span></span></div>`;
            detailsHtml += `<div class="stat-row"><span>강화 사거리:</span> <span>📏 ${t.range} ➡️ <span class="stat-up">📏 ${t.range + 15}</span></span></div>`;
        } else {
            if (t.type !== 'sprinkler' && t.type !== 'log') {
                let nextDmg = t.damage + Math.max(1, Math.floor(t.damage * 0.35));
                detailsHtml += `<div class="stat-row"><span>기본 피해량:</span> <span>⚔️ ${Number.isInteger(t.damage) ? t.damage : t.damage.toFixed(2)} ➡️ <span class="stat-up">⚔️ ${Number.isInteger(nextDmg) ? nextDmg : nextDmg.toFixed(2)}</span></span></div>`;
            } else if (t.type === 'log') {
                let curDist = 200 + (t.level * 80); let nextDist = 200 + ((t.level + 1) * 80);
                detailsHtml += `<div class="stat-row"><span>굴러가는 거리:</span> <span>📏 ${curDist} ➡️ <span class="stat-up">📏 ${nextDist}</span></span></div>`;
            }
            if (t.range > 0) detailsHtml += `<div class="stat-row"><span>탐지 사거리:</span> <span>📏 ${t.range} ➡️ <span class="stat-up">📏 ${t.range + 15}</span></span></div>`;

            let speedMult = 1.0;
            state.towers.forEach(other => {
                if (other.type === 'amplifier' && Math.hypot(t.x - other.x, t.y - other.y) <= other.range) {
                    speedMult = Math.max(speedMult, 1 + Math.min(0.5, 0.10 + (other.level - 1) * 0.05));
                }
            });
            let curSpeed = (t.cooldownMax / speedMult).toFixed(2); let nextSpeed = (Math.max(0.1, t.cooldownMax * 0.9) / speedMult).toFixed(2);
            let buffTag = speedMult > 1.0 ? ' <span style="color:#f39c12; font-size:10px;">(강화됨)</span>' : '';
            detailsHtml += `<div class="stat-row"><span>공격 대기시간:</span> <span>⏱️ ${curSpeed}초${buffTag} ➡️ <span class="stat-up">${nextSpeed}초</span></span></div>`;
        }
        document.getElementById('upgrade-details').innerHTML = detailsHtml;
    }

    const handleUpgradeTouch = (e) => {
        e.preventDefault(); let t = state.selectedTower; if (!t) return;
        let cost = t.upCost * t.level;
        if (state.money >= cost) {
            state.money -= cost; t.totalCost += cost; t.level++;
            if (t.type === 'mine') t.prod += 1;
            else if (t.type !== 'amplifier') {
                if (t.type === 'log') t.damage = 0; else t.damage += Math.max(1, Math.floor(t.damage * 0.35));
                if (t.type === 'tesla') t.stunDuration = Math.min(1.8, (t.stunDuration || 0.5) + 0.25);
            }
            if (t.range > 0) t.range += 15;
            if (t.type !== 'amplifier') t.cooldownMax = Math.max(0.1, t.cooldownMax * 0.9);
            createParticle('text', t.x, t.y, { text: '레벨 업!', color: '#2ecc71' }); updateUpgradeUI(); saveGame();
        }
    };
    document.getElementById('btn-do-upgrade').addEventListener('touchstart', handleUpgradeTouch, {passive:false});
    document.getElementById('btn-do-upgrade').addEventListener('click', handleUpgradeTouch);

    const handleSellTouch = (e) => {
        e.preventDefault(); if (!state.selectedTower) return;
        let t = state.selectedTower; let refund = Math.floor(t.totalCost * 0.6); state.money += refund;
        createParticle('text', t.x, t.y, { text: '+💰' + refund, color: '#f1c40f' });
        let index = state.towers.indexOf(t); if(index > -1) state.towers.splice(index, 1);
        closeUpgradeMenu(); saveGame();
    };
    document.getElementById('btn-sell-tower').addEventListener('touchstart', handleSellTouch, {passive:false});
    document.getElementById('btn-sell-tower').addEventListener('click', handleSellTouch);

    const handleSetAngleTouch = (e) => {
        e.preventDefault();
        if (state.selectedTower && state.selectedTower.type === 'log') {
            state.settingAngleMode = true;
            document.getElementById('normal-bottom').style.display = 'none';
            document.getElementById('angle-ui').style.display = 'flex';
        }
    };
    document.getElementById('btn-set-angle').addEventListener('touchstart', handleSetAngleTouch, {passive:false});
    document.getElementById('btn-set-angle').addEventListener('click', handleSetAngleTouch);

    window.finishAngleSetting = function() {
        state.settingAngleMode = false; state.isDraggingAngle = false;
        document.getElementById('normal-bottom').style.display = 'flex';
        document.getElementById('angle-ui').style.display = 'none';
        if(state.selectedTower) createParticle('text', state.selectedTower.x, state.selectedTower.y, { text: '방향 저장됨!', color: '#27ae60' });
        saveGame(); setTimeout(resizeCanvas, 5);
    };

    const handleCancelTouch = (e) => { e.preventDefault(); closeUpgradeMenu(); };
    document.getElementById('btn-cancel-upgrade').addEventListener('touchstart', handleCancelTouch, {passive:false});
    document.getElementById('btn-cancel-upgrade').addEventListener('click', handleCancelTouch);

    function applyDamageToEnemy(target, baseDamage) {
        let reduction = 0;
        state.enemies.forEach(e => {
            if (e.type === 'shield' && e.hp > 0 && Math.hypot(e.x - target.x, e.y - target.y) <= 70) reduction = 0.25; 
        });
        if (reduction > 0 && baseDamage > 0) createParticle('splash', target.x, target.y, { radius: 15, color: 'rgba(52, 152, 219, 0.4)' }); 
        target.hp -= baseDamage * (1 - reduction);
    }

    function update(dt) {
        const checkPathX = canvas.width / 2;

        for (let i = state.particles.length - 1; i >= 0; i--) {
            state.particles[i].life -= dt * 2;
            if (state.particles[i].life <= 0) state.particles.splice(i, 1);
        }

        if (state.isGameOver) return; 
        document.getElementById('wave-text').innerText = state.wave;
        document.getElementById('money-text').innerText = state.money;
        
        if (state.selectedTower && !state.settingAngleMode) updateUpgradeUI();

        document.querySelectorAll('.card').forEach(card => {
            let tType = card.dataset.type;
            if (state.money < TOWER_DEFS[tType].cost || (tType === 'mine' && state.towers.filter(t => t.type === 'mine').length >= 10)) card.classList.add('disabled');
            else card.classList.remove('disabled');
        });

        if (state.isWaveActive) {
            state.spawnTimer += dt;
            if (state.spawnTimer > 1.2 && state.enemiesToSpawn.length > 0) {
                state.spawnTimer = 0;
                let next = state.enemiesToSpawn.shift(); let def = ENEMY_DEFS[next.type];
                state.enemies.push({
                    x: checkPathX + (Math.random() * 26 - 13), y: -20, ...def, 
                    hp: def.maxHp * next.hpMult, maxHp: def.maxHp * next.hpMult,
                    speed: def.speed * next.speedMult, isWet: false, wetTimer: 0, wetSlow: 1.0,
                    kbVelocity: 0, stunTimer: 0, type: next.type
                });
            }
            if (state.enemiesToSpawn.length === 0 && state.enemies.length === 0) {
                state.isWaveActive = false; state.waveDelay = 3.0;
                let bonus = state.wave * 20; state.money += bonus;
                createParticle('text', canvas.width/2, canvas.height/2, { text: `웨이브 ${state.wave} 완료! +💰${bonus}`, color: '#f1c40f' });
                saveGame();
            }
        } else {
            state.waveDelay -= dt;
            if (state.waveDelay <= 0) { state.wave++; generateWave(state.wave); }
        }

        for (let i = state.enemies.length - 1; i >= 0; i--) {
            let e = state.enemies[i];
            if (e.type === 'healer') {
                if (!e.healCooldown) e.healCooldown = 1.5;  e.healCooldown -= dt;
                if (e.healCooldown <= 0) {
                    e.healCooldown = 1.5; let healedAny = false;
                    state.enemies.forEach(other => {
                        if (other !== e && Math.hypot(other.x - e.x, other.y - e.y) <= 90) {
                            let healAmount = Math.min(other.maxHp - other.hp, other.maxHp * 0.25); 
                            if (healAmount > 0) {
                                other.hp += healAmount; healedAny = true;
                                createParticle('text', other.x, other.y - 10, { text: '💚 +' + Math.floor(healAmount), color: '#2ecc71' });
                            }
                        }
                    });
                    if (healedAny) createParticle('splash', e.x, e.y, { radius: 90 });
                }
            }

            if (e.isWet) { e.wetTimer -= dt; if (e.wetTimer <= 0) { e.isWet = false; e.wetSlow = 1.0; } }

            if (e.stunTimer > 0) {
                e.stunTimer -= dt;
                if (e.kbVelocity > 0) { e.y -= e.kbVelocity * dt; e.kbVelocity -= 300 * dt; if (e.kbVelocity < 0) e.kbVelocity = 0; }
            } else {
                if (e.kbVelocity > 0) { e.y -= e.kbVelocity * dt; e.kbVelocity -= 300 * dt; if (e.kbVelocity < 0) e.kbVelocity = 0; }
                else e.y += e.speed * (e.isWet ? e.wetSlow : 1.0) * dt;
            }

            if (e.hp <= 0) {
                state.money += e.reward;
                createParticle('text', e.x, e.y, { text: '+💰' + e.reward, color: '#f1c40f' });
                state.enemies.splice(i, 1); continue;
            }

            if (e.y >= canvas.height + e.radius) {
                state.hp = 0; state.isGameOver = true;
                createParticle('explosion', e.x, canvas.height, { radius: 60 });
                setTimeout(() => { 
                    const overlay = document.getElementById('game-over-overlay');
                    const btnRetry = document.getElementById('btn-retry-wave');
                    overlay.style.display = 'flex';
                    let autoSec = 3; btnRetry.innerText = `현재 웨이브 재도전 (${autoSec}초)`;
                    state.autoRetryInterval = setInterval(() => {
                        autoSec--;
                        if (autoSec > 0) btnRetry.innerText = `현재 웨이브 재도전 (${autoSec}초)`;
                        else { clearInterval(state.autoRetryInterval); state.autoRetryInterval = null; retryWave(false); }
                    }, 1000);
                }, 800);
                return;
            }
        }

        for (let i = state.projectiles.length - 1; i >= 0; i--) {
            let p = state.projectiles[i];
            if (p.type === 'cannon_ball' || p.type === 'arrow') {
                if (p.target && state.enemies.includes(p.target)) {
                    let dx = p.target.x - p.x; let dy = p.target.y - p.y; let dist = Math.hypot(dx, dy);
                    if (dist < 8) {
                        applyDamageToEnemy(p.target, p.damage);
                        createParticle(p.type === 'arrow' ? 'splash' : 'explosion', p.target.x, p.target.y, { radius: 10 });
                        state.projectiles.splice(i, 1); continue;
                    }
                    p.x += (dx / dist) * p.speed * dt; p.y += (dy / dist) * p.speed * dt;
                } else state.projectiles.splice(i, 1);
            } else if (p.type === 'mortar_shell') {
                p.progress += p.speed * dt;
                if (p.progress >= 1) {
                    createParticle('explosion', p.tx, p.ty, { radius: 46 });
                    state.enemies.forEach(e => { if (Math.hypot(e.x - p.tx, e.y - p.ty) <= 46) applyDamageToEnemy(e, p.damage); });
                    state.projectiles.splice(i, 1);
                } else {
                    p.x = p.startX + (p.tx - p.startX) * p.progress;
                    let arc = Math.sin(p.progress * Math.PI) * 60; p.y = p.startY + (p.ty - p.startY) * p.progress - arc;
                }
            } else if (p.type === 'log_obj') {
                let moveStep = p.speed * dt; p.distance += moveStep; p.rotation += dt * 6.0; 
                if (p.distance > p.maxDistance) { state.projectiles.splice(i, 1); continue; }
                p.x += Math.cos(p.angle) * moveStep; p.y += Math.sin(p.angle) * moveStep;
                state.enemies.forEach(e => {
                    if (Math.hypot(e.x - p.x, e.y - p.y) < e.radius + 14) {
                        if (!p.hitList.includes(e)) {
                            p.hitList.push(e); applyDamageToEnemy(e, p.damage);
                            e.kbVelocity = 70; createParticle('text', e.x, e.y, { text: '🪵 밀침!', color: '#e67e22' });
                        }
                    }
                });
            }
        }

        state.towers.forEach(t => {
            let speedMult = 1.0;
            state.towers.forEach(other => {
                if (other.type === 'amplifier' && Math.hypot(t.x - other.x, t.y - other.y) <= other.range) {
                    speedMult = Math.max(speedMult, 1 + Math.min(0.5, 0.10 + (other.level - 1) * 0.05));
                }
            });
            
            t.speedMult = speedMult; t.isBuffed = (speedMult > 1.0 && t.type !== 'amplifier' && t.type !== 'mine');
            t.cooldown -= dt * speedMult; 

            if (t.type === 'mine') {
                if (t.cooldown <= 0) {
                    state.money += t.prod; t.cooldown = t.cooldownMax;
                    createParticle('text', t.x, t.y - 12, { text: '+💰' + t.prod, color: '#f1c40f' });
                } return;
            } else if (t.type === 'amplifier') return; 

            if (t.type === 'pyro') {
                let targetValid = t.currentTarget && state.enemies.includes(t.currentTarget) && Math.hypot(t.x - t.currentTarget.x, t.y - t.currentTarget.y) <= t.range;
                
                if (!targetValid) {
                    if (t.currentTarget !== null) {
                        t.currentTarget = null; t.searchDelay = 0.4; // 타겟 상실 시 0.4초 딜레이
                        t.laserCharge = 0; t.isFiring = false;
                    }
                }
                
                if (!t.currentTarget) {
                    if (t.searchDelay > 0) {
                        t.searchDelay -= dt;
                    } else {
                        let minDist = t.range; let newTarget = null;
                        state.enemies.forEach(e => {
                            let d = Math.hypot(t.x - e.x, t.y - e.y);
                            if (d <= minDist) { minDist = d; newTarget = e; }
                        });
                        if (newTarget) t.currentTarget = newTarget;
                    }
                }

                if (t.currentTarget) {
                    t.laserCharge = Math.min(10, t.laserCharge + dt * 3.5); t.isFiring = true;
                    t.beamTx = t.currentTarget.x; t.beamTy = t.currentTarget.y;
                    t.targetAngle = Math.atan2(t.currentTarget.y - t.y, t.currentTarget.x - t.x);
                    if (t.cooldown <= 0) {
                        applyDamageToEnemy(t.currentTarget, t.damage + Math.floor(t.laserCharge)); t.cooldown = t.cooldownMax;
                    }
                }
                
                // 자연스러운 회전 처리
                if (t.currentAngle !== undefined && t.currentTarget) {
                    let diff = t.targetAngle - t.currentAngle;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    t.currentAngle += diff * dt * 8; 
                }
                return;
            }

            let target = null;
            if (t.currentTarget && state.enemies.includes(t.currentTarget)) {
                if (Math.hypot(t.x - t.currentTarget.x, t.y - t.currentTarget.y) <= t.range) target = t.currentTarget;
                else { t.laserCharge = 0; t.currentTarget = null; }
            }

            if (!target && t.range > 0) {
                let minDist = t.range;
                state.enemies.forEach(e => {
                    let d = Math.hypot(t.x - e.x, t.y - e.y);
                    if (d <= minDist) { minDist = d; target = e; }
                });
                t.currentTarget = target;
            }

            if (target && t.type !== 'sprinkler' && t.type !== 'log' && t.type !== 'tesla') {
                t.targetAngle = Math.atan2(target.y - t.y, target.x - t.x);
            }
            if (t.currentAngle !== undefined) {
                let diff = t.targetAngle - t.currentAngle;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                t.currentAngle += diff * dt * 8; 
            }

            if (t.type === 'log') {
                if (t.cooldown <= 0) {
                    t.cooldown = t.cooldownMax; let logMaxDistance = 200 + (t.level * 80); 
                    state.projectiles.push({ type: 'log_obj', x: t.x, y: t.y, speed: 120, angle: t.angle, damage: t.damage, hitList: [], distance: 0, maxDistance: logMaxDistance, rotation: 0 });
                } return;
            }

            if (target && t.cooldown <= 0) {
                t.cooldown = t.cooldownMax;
                if (t.type === 'cannon') {
                    state.projectiles.push({ type: 'cannon_ball', x: t.x, y: t.y, speed: 180, target: target, damage: t.damage });
                } else if (t.type === 'shotgun') {
                    applyDamageToEnemy(target, t.damage); createParticle('splash', target.x, target.y, { radius: 22, color: 'rgba(236, 240, 241, 0.8)' });
                    for(let j=0; j<4; j++) createParticle('laser', t.x, t.y, { tx: target.x + (Math.random()-0.5)*25, ty: target.y + (Math.random()-0.5)*25, color: 'rgba(236, 240, 241, 0.6)', width: 3 });
                } else if (t.type === 'mortar') {
                    let dist = Math.hypot(target.x - t.x, target.y - t.y); let duration = Math.max(0.5, dist / 160); 
                    state.projectiles.push({ type: 'mortar_shell', x: t.x, y: t.y, startX: t.x, startY: t.y, tx: target.x, ty: target.y, progress: 0, speed: 1 / duration, damage: t.damage });
                } else if (t.type === 'sprinkler') {
                    state.enemies.forEach(e => {
                        if (Math.hypot(t.x - e.x, t.y - e.y) <= t.range) { 
                            e.isWet = true; e.wetTimer = 3.0; e.wetSlow = Math.min(e.wetSlow, Math.max(0.5, 0.85 - (t.level - 1) * 0.07)); 
                        }
                    });
                    createParticle('splash', t.x, t.y, { radius: t.range });
                } else if (t.type === 'tesla') {
                    let dmg = target.isWet ? t.damage * 1.6 : t.damage;
                    applyDamageToEnemy(target, dmg); target.stunTimer = Math.max(target.stunTimer, t.stunDuration || 0.5);
                    createParticle('lightning', t.x, t.y, { tx: target.x, ty: target.y });
                    if (target.isWet) {
                        let chainTarget = null, chainDist = 100;
                        state.enemies.forEach(e => {
                            if (e !== target && Math.hypot(target.x - e.x, target.y - e.y) <= chainDist) { chainDist = Math.hypot(target.x - e.x, target.y - e.y); chainTarget = e; }
                        });
                        if (chainTarget) {
                            applyDamageToEnemy(chainTarget, dmg); chainTarget.stunTimer = Math.max(chainTarget.stunTimer, t.stunDuration || 0.5);
                            createParticle('lightning', target.x, target.y, { tx: chainTarget.x, ty: chainTarget.y });
                        }
                    }
                } else if (t.type === 'crossbow') {
                    state.projectiles.push({ type: 'arrow', x: t.x, y: t.y, speed: 450, target: target, damage: t.damage });
                }
            }
        });
    }

    function drawTowerDesign(ctx, type, renderAngle, tObj = null) {
        switch (type) {
            case 'mine': 
                ctx.fillStyle = '#f368e0'; ctx.beginPath(); ctx.ellipse(2, 0, 3, 5, 0, 0, Math.PI*2); ctx.fill(); // 돼지 코
                ctx.fillStyle = '#222'; ctx.fillRect(-2, -1, 4, 2); // 동전 구멍
                break;
            case 'amplifier': 
                ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI*2); ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.stroke(); 
                ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI*2); ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1; ctx.stroke(); 
                break;
            case 'cannon': 
                ctx.rotate(renderAngle); ctx.fillStyle = '#27ae60'; ctx.fillRect(4, -4, 18, 8); // 초록색 완두콩 발사대
                break;
            case 'shotgun': 
                ctx.fillStyle = '#bdc3c7'; ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill(); // 솥 뚜껑
                ctx.rotate(renderAngle); ctx.fillStyle = '#34495e'; ctx.fillRect(2, -2, 14, 4); // 압력솥 손잡이
                break;
            case 'mortar': 
                ctx.rotate(renderAngle); ctx.fillStyle = '#5d4037'; ctx.fillRect(0, -6, 12, 12); // 코코넛 나무통
                break;
            case 'tesla': 
                ctx.fillStyle = '#7f8c8d'; ctx.fillRect(-8, -6, 16, 12); // 그릴 외형
                ctx.strokeStyle = '#34495e'; ctx.lineWidth = 1;
                for(let y = -4; y <= 4; y += 4) { ctx.beginPath(); ctx.moveTo(-6, y); ctx.lineTo(6, y); ctx.stroke(); }
                break;
            case 'pyro': 
                ctx.rotate(renderAngle); 
                ctx.fillStyle = '#3498db'; ctx.fillRect(-4, -6, 8, 12); // 파란 가스통
                ctx.fillStyle = '#f1c40f'; ctx.fillRect(4, -2, 6, 4);   // 황동색 노즐
                break;
            case 'crossbow': 
                ctx.rotate(renderAngle); 
                ctx.fillStyle = '#a0522d'; ctx.fillRect(2, -1, 14, 2); // 나무 받침대
                ctx.fillStyle = '#f5deb3'; ctx.fillRect(4, -0.5, 12, 1); // 이쑤시개 장전
                ctx.beginPath(); ctx.moveTo(12, -6); ctx.lineTo(16, 0); ctx.lineTo(12, 6); 
                ctx.strokeStyle = '#a0522d'; ctx.lineWidth = 1.5; ctx.stroke(); 
                break;
            case 'log': 
                ctx.rotate(renderAngle); 
                ctx.fillStyle = '#e1b12c'; ctx.fillRect(-4, -10, 8, 20); // 밀대 나무 본체
                ctx.fillStyle = '#c23616'; ctx.fillRect(-2, -14, 4, 4); ctx.fillRect(-2, 10, 4, 4); // 밀대 빨간 손잡이
                break;
            case 'sprinkler': 
                ctx.fillStyle = '#ecf0f1'; ctx.fillRect(-6, -8, 12, 16); // 흰색 정수기 본체
                ctx.fillStyle = '#3498db'; ctx.fillRect(-4, -6, 8, 5); // 파란 물통
                ctx.fillStyle = '#e74c3c'; ctx.fillRect(-4, 0, 3, 3); // 온수 버튼
                ctx.fillStyle = '#3498db'; ctx.fillRect(1, 0, 3, 3); // 냉수 버튼
                break;
        }
    }

    function draw() {
        ctx.fillStyle = '#27ae60'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const checkPathX = canvas.width / 2;

        if (state.environmentProps) {
            state.environmentProps.forEach(prop => {
                ctx.save(); ctx.translate(prop.x, prop.y);
                if (prop.type === 0) {
                    ctx.strokeStyle = '#1e824c'; ctx.lineWidth = 1.5; ctx.beginPath();
                    ctx.moveTo(0, 0); ctx.lineTo(-3, -7); ctx.moveTo(0, 0); ctx.lineTo(0, -9); ctx.moveTo(0, 0); ctx.lineTo(3, -6); ctx.stroke();
                } else if (prop.type === 1) {
                    ctx.fillStyle = '#1e824c'; ctx.fillRect(-0.5, -3, 1, 3);
                    ctx.fillStyle = prop.color; ctx.beginPath(); ctx.arc(0, -4, 2.5, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, -4, 0.8, 0, Math.PI*2); ctx.fill();
                } else {
                    ctx.fillStyle = '#95a5a6'; ctx.beginPath(); ctx.ellipse(0, 0, 3.5, 1.8, 0, 0, Math.PI*2); ctx.fill();
                }
                ctx.restore();
            });
        }

        ctx.fillStyle = '#8b5a2b'; ctx.fillRect(checkPathX - 30, 0, 60, canvas.height);
        ctx.fillStyle = '#7f8c8d';
        for (let y = 0; y < canvas.height + 20; y += 16) {
            ctx.fillRect(checkPathX - 34, y - 8, 5, 11); ctx.fillRect(checkPathX + 29, y - 8, 5, 11); 
        }

        ctx.fillStyle = '#704214';
        for (let y = 15; y < canvas.height + 40; y += 45) {
            ctx.beginPath();
            ctx.arc(checkPathX - 12, y, 4, 0, Math.PI * 2); ctx.arc(checkPathX + 15, y - 20, 5, 0, Math.PI * 2);
            ctx.arc(checkPathX + 2, y - 10, 3, 0, Math.PI * 2); ctx.fill();
        }

        state.towers.forEach(t => {
            if (t.isBuffed) {
                ctx.beginPath(); ctx.arc(t.x, t.y, t.radius + 3, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(243, 156, 18, 0.8)'; ctx.lineWidth = 3; ctx.stroke();
            }

            if (t.type === 'pyro' && t.isFiring) {
                ctx.save(); ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(t.beamTx, t.beamTy);
                ctx.strokeStyle = 'rgba(230, 126, 34, 0.35)'; ctx.lineWidth = t.laserCharge + 8 + Math.sin(Date.now() * 0.06) * 3; ctx.stroke();
                ctx.strokeStyle = '#e67e22'; ctx.lineWidth = t.laserCharge + 3; ctx.stroke();
                ctx.strokeStyle = '#f1c40f'; ctx.lineWidth = t.laserCharge / 2 + 1; ctx.stroke(); ctx.restore();
            }

            ctx.beginPath(); ctx.arc(t.x, t.y, t.radius, 0, Math.PI * 2);
            ctx.fillStyle = t.color; ctx.fill(); ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 2.5; ctx.stroke();

            ctx.save(); ctx.translate(t.x, t.y);
            let renderAngle = t.type === 'log' ? t.angle : (t.currentAngle !== undefined ? t.currentAngle : 0);
            drawTowerDesign(ctx, t.type, renderAngle, t);
            ctx.restore();

            ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.font = 'bold 9px Arial';
            ctx.textAlign = 'center'; ctx.fillText(`L${t.level}`, t.x, t.y + 14);

            if (t.type === 'log' && state.settingAngleMode && state.selectedTower === t) {
                let logMaxDist = 200 + (t.level * 80);
                ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(t.x + Math.cos(t.angle) * 35, t.y + Math.sin(t.angle) * 35);
                ctx.strokeStyle = '#d35400'; ctx.lineWidth = 4; ctx.stroke();
                ctx.beginPath(); ctx.setLineDash([4, 4]); ctx.moveTo(t.x, t.y);
                ctx.lineTo(t.x + Math.cos(t.angle) * logMaxDist, t.y + Math.sin(t.angle) * logMaxDist);
                ctx.strokeStyle = 'rgba(211, 84, 0, 0.7)'; ctx.lineWidth = 2; ctx.stroke(); ctx.setLineDash([]);
            }

            if (state.selectedTower === t && t.range > 0) {
                ctx.beginPath(); ctx.arc(t.x, t.y, t.range, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)'; ctx.fill(); ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.stroke();
            }
        });

        if (state.isDraggingCard && state.dragCardType) {
            let def = TOWER_DEFS[state.dragCardType];
            let px = state.dragX; let py = state.dragY;
            const isCanceled = state.dragClientY > canvas.getBoundingClientRect().bottom || px < 0 || px > canvas.width;
            
            ctx.save();
            if (def.range > 0 && !isCanceled) {
                ctx.beginPath(); ctx.arc(px, py, def.range, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.15)'; ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)'; ctx.lineWidth = 1; ctx.stroke();
            }

            ctx.globalAlpha = 0.6;
            ctx.beginPath(); ctx.arc(px, py, def.radius, 0, Math.PI * 2);
            ctx.fillStyle = isCanceled || (!isCanceled && !canBuild(px, py, def.radius) && state.dragCardType !== 'mine') ? '#e74c3c' : def.color; 
            ctx.fill(); ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 2.5; ctx.stroke();

            ctx.translate(px, py);
            let renderAngle = def.angle || -Math.PI / 2;
            drawTowerDesign(ctx, state.dragCardType, renderAngle, null);
            ctx.restore();
        }

        state.enemies.forEach(e => {
            ctx.save(); ctx.translate(e.x, e.y);
            if (e.type === 'shield') {
                ctx.beginPath(); ctx.arc(0, 0, 70, 0, Math.PI*2);
                ctx.strokeStyle = '#3498db'; ctx.setLineDash([5, 5]); ctx.lineWidth = 2; ctx.stroke(); ctx.setLineDash([]);
            }
            ctx.font = `${e.radius * 1.8}px Apple Color Emoji, Segoe UI Emoji`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(e.emoji, 0, 0);
            if (e.stunTimer > 0) { ctx.font = 'bold 11px Arial'; ctx.fillText('⚡', -12, -12); }
            if (e.isWet) { ctx.font = '10px Arial'; ctx.fillText('💧', 12, -12); }
            ctx.restore();

            let ratio = Math.max(0, e.hp / e.maxHp);
            ctx.fillStyle = '#e74c3c'; ctx.fillRect(e.x - 10, e.y - e.radius - 8, 20, 3.5);
            ctx.fillStyle = '#2ecc71'; ctx.fillRect(e.x - 10, e.y - e.radius - 8, 20 * ratio, 3.5);
        });

        state.projectiles.forEach(p => {
            if (p.type === 'cannon_ball') {
                ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fillStyle = '#2ecc71'; ctx.fill(); // 초록색 완두콩
            } else if (p.type === 'mortar_shell') {
                ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI * 2); ctx.fillStyle = '#795548'; ctx.fill(); // 갈색 코코넛
                ctx.strokeStyle = '#3e2723'; ctx.lineWidth = 1; ctx.stroke();
            } else if (p.type === 'arrow') {
                ctx.save(); ctx.translate(p.x, p.y);
                let angle = p.target ? Math.atan2(p.target.y - p.y, p.target.x - p.x) : 0; ctx.rotate(angle);
                ctx.fillStyle = '#f5deb3'; ctx.fillRect(-6, -1, 12, 2); // 베이지색 이쑤시개
                ctx.restore();
            } else if (p.type === 'log_obj') {
                ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle); 
                ctx.fillStyle = '#e1b12c'; ctx.fillRect(-6, -16, 12, 32); // 밀대 본체
                ctx.fillStyle = '#c23616'; ctx.fillRect(-3, -20, 6, 4); ctx.fillRect(-3, 16, 6, 4); // 양쪽 빨간 손잡이
                ctx.restore();
            }
        });

        state.particles.forEach(p => {
            ctx.save(); ctx.globalAlpha = Math.max(0, p.life);
            if (p.type === 'text') {
                ctx.fillStyle = p.color; ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center'; ctx.fillText(p.text, p.x, p.y - (1 - p.life) * 15);
            } else if (p.type === 'laser') {
                ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.tx, p.ty);
                ctx.strokeStyle = p.color; ctx.lineWidth = p.width || 1.5; ctx.stroke();
            } else if (p.type === 'lightning') {
                ctx.beginPath(); ctx.moveTo(p.x, p.y);
                let midX = (p.x + p.tx)/2 + (Math.random()-0.5)*18; let midY = (p.y + p.ty)/2 + (Math.random()-0.5)*18;
                ctx.lineTo(midX, midY); ctx.lineTo(p.tx, p.ty);
                ctx.strokeStyle = '#f1c40f'; ctx.lineWidth = 2.5; ctx.stroke();
            } else if (p.type === 'splash') {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius * (1 - p.life), 0, Math.PI*2);
                ctx.fillStyle = p.color || `rgba(52, 152, 219, ${p.life * 0.45})`; ctx.fill();
            } else if (p.type === 'explosion') {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius * (1 - p.life), 0, Math.PI*2);
                ctx.fillStyle = `rgba(230, 126, 34, ${p.life * 0.7})`; ctx.fill();
            }
            ctx.restore();
        });

        if (!state.isWaveActive && state.waveDelay > 0) {
            ctx.fillStyle = 'white'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center';
            ctx.fillText(`웨이브 ${state.wave} 준비 중`, canvas.width/2, canvas.height/2 - 10);
            ctx.font = '13px Arial'; ctx.fillText(`${Math.ceil(state.waveDelay)}초 후 시작합니다`, canvas.width/2, canvas.height/2 + 15);
        }
    }

    function loop(time) {
        let dt = (time - state.lastTime) / 1000; state.lastTime = time;
        if (dt < 0.1) { update(dt); draw(); } requestAnimationFrame(loop);
    }
    
    if (!loadGame()) { generateWave(state.wave); } else { generateWave(state.wave); }
    requestAnimationFrame(loop);
</script>
</body>
</html>
